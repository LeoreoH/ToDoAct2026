<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz · Reconocer fracciones · Nivel Fácil</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #8e24aa, #5e35b1);
      min-height: 100vh;
      color: white;
    }

    .quiz-container {
      max-width: 900px;
      margin: 50px auto;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 40px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      border: 4px solid #ffd54f;
      position: relative;
    }

    .quiz-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .quiz-header h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 3rem;
      color: #ffd54f;
      text-shadow: 3px 3px 0 #4a148c;
    }

    .badge-nivel {
      background: #4a148c;
      color: white;
      padding: 8px 25px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1.05rem;
      display: inline-block;
      border: 2px solid #ffd54f;
    }

    .timer-container {
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 10px 20px;
      margin: 20px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 2px solid #ffd54f;
    }

    .timer-label {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .timer-value {
      font-size: 1.3rem;
      font-weight: 800;
      color: #ffd54f;
      font-family: monospace;
    }

    .progreso-quiz {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 30px 0;
      flex-wrap: wrap;
    }

    .punto {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: 3px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.2rem;
      color: white;
      transition: all 0.3s;
    }

    .punto.activo {
      background: #ffd54f;
      border-color: white;
      color: #4a148c;
      transform: scale(1.15);
    }

    .punto.respondido {
      background: #4caf50;
      border-color: white;
      color: white;
    }

    .tarjeta-pregunta {
      background: white;
      border-radius: 30px;
      padding: 30px;
      margin-bottom: 25px;
      border: 4px solid #ffd54f;
      box-shadow: 0 8px 0 #d39e00;
      color: #4a148c;
    }

    .pregunta-numero {
      font-size: 1rem;
      color: #7b1fa2;
      font-weight: 800;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .pregunta-texto {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 22px;
      line-height: 1.45;
    }

    .figura-wrap {
      margin: 0 0 22px 0;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 18px;
    }

    .barra-fraccion {
      width: min(620px, 100%);
      height: 72px;
      border: 4px solid #7b1fa2;
      border-radius: 22px;
      overflow: hidden;
      display: flex;
      background: white;
      box-shadow: 0 6px 0 #d1c4e9;
    }

    .parte {
      flex: 1;
      height: 100%;
      background: white;
      position: relative;
    }

    .parte + .parte {
      border-left: 4px solid #7b1fa2;
    }

    .parte.pintada {
      background: linear-gradient(135deg, #ba68c8, #7e57c2);
    }

    .barra-fraccion.desigual .parte {
      flex: unset;
    }

    .barra-fraccion.desigual .parte:nth-child(1) { width: 16%; }
    .barra-fraccion.desigual .parte:nth-child(2) { width: 34%; }
    .barra-fraccion.desigual .parte:nth-child(3) { width: 20%; }
    .barra-fraccion.desigual .parte:nth-child(4) { width: 30%; }

    .etiqueta-figura {
      text-align: center;
      font-weight: 800;
      color: #6a1b9a;
      margin-top: 8px;
    }

    .figura-col {
      width: min(320px, 100%);
    }

    .fraccion-panel {
      background: #f7f1ff;
      border: 3px solid #d1c4e9;
      border-radius: 20px;
      padding: 18px;
      text-align: center;
      margin-bottom: 22px;
    }

    .fraccion-grande {
      display: inline-block;
      font-size: 2rem;
      font-weight: 900;
      color: #5e35b1;
      line-height: 1.1;
      min-width: 90px;
    }

    .fraccion-grande .linea {
      display: block;
      height: 4px;
      background: #5e35b1;
      margin: 4px 0;
      border-radius: 2px;
    }

    .recta-wrap {
      width: min(640px, 100%);
      position: relative;
      height: 110px;
      margin: 0 auto;
    }

    .linea-recta {
      position: absolute;
      left: 6%;
      right: 6%;
      top: 48px;
      height: 6px;
      background: #7b1fa2;
      border-radius: 999px;
    }

    .marca {
      position: absolute;
      top: 24px;
      width: 0;
      height: 42px;
      border-left: 4px solid #7b1fa2;
      transform: translateX(-50%);
    }

    .marca span {
      position: absolute;
      top: 44px;
      left: 50%;
      transform: translateX(-50%);
      font-weight: 800;
      color: #6a1b9a;
      white-space: nowrap;
      font-size: 0.95rem;
    }

    .punto-fraccion {
      position: absolute;
      top: 5px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #ffd54f;
      border: 3px solid #7b1fa2;
      transform: translateX(-50%);
      box-shadow: 0 4px 0 #d39e00;
    }

    .opciones {
      display: grid;
      gap: 12px;
    }

    .opcion-btn {
      background: #f3e5f5;
      border: 3px solid #7b1fa2;
      border-radius: 20px;
      padding: 15px 20px;
      color: #4a148c;
      font-weight: 700;
      font-size: 1.05rem;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }

    .opcion-btn:hover:not(:disabled) {
      background: #ffd54f;
      transform: scale(1.02);
      border-color: #4a148c;
    }

    .opcion-btn.correcta {
      background: #4caf50;
      color: white;
      border-color: white;
    }

    .opcion-btn.incorrecta {
      background: #f44336;
      color: white;
      border-color: white;
    }

    .opcion-btn:disabled {
      cursor: not-allowed;
      opacity: 0.95;
    }

    .feedback {
      margin-top: 20px;
      padding: 15px;
      border-radius: 15px;
      font-weight: 700;
      display: none;
      line-height: 1.5;
    }

    .feedback.visible {
      display: block;
    }

    .feedback.correcto {
      background: #c8e6c9;
      color: #2e7d32;
      border-left: 8px solid #2e7d32;
    }

    .feedback.incorrecto {
      background: #ffcdd2;
      color: #c62828;
      border-left: 8px solid #c62828;
    }

    .navegador-quiz {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 30px;
      gap: 15px;
      flex-wrap: wrap;
    }

    .btn-nav {
      background: #ffd54f;
      color: #4a148c;
      border: none;
      padding: 12px 30px;
      border-radius: 40px;
      font-weight: 800;
      font-size: 1.15rem;
      border: 3px solid white;
      transition: all 0.2s;
    }

    .btn-nav:hover:not(:disabled) {
      background: white;
      transform: scale(1.05);
    }

    .btn-nav:disabled {
      background: #b0bec5;
      opacity: 0.5;
      cursor: not-allowed;
    }

    .contador {
      background: #4a148c;
      color: white;
      padding: 8px 25px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1.1rem;
      border: 2px solid #ffd54f;
    }

    .resultado {
      text-align: center;
      padding: 30px;
      display: none;
    }

    .resultado.visible {
      display: block;
    }

    .resultado-emoji {
      font-size: 5rem;
      margin-bottom: 15px;
    }

    .resultado-titulo {
      font-family: 'Fredoka One', cursive;
      font-size: 2.5rem;
      color: #ffd54f;
      margin-bottom: 15px;
    }

    .resultado-puntaje {
      font-size: 4rem;
      font-weight: 900;
      color: white;
      background: #4a148c;
      display: inline-block;
      padding: 20px 50px;
      border-radius: 60px;
      margin: 20px 0;
      border: 4px solid #ffd54f;
    }

    .btn-accion {
      background: #ffd54f;
      color: #4a148c;
      border: none;
      padding: 15px 40px;
      border-radius: 60px;
      font-weight: 800;
      font-size: 1.2rem;
      margin: 10px;
      border: 4px solid white;
      transition: all 0.2s;
    }

    .btn-accion:hover {
      transform: scale(1.05);
      background: white;
    }

    @media (max-width: 768px) {
      .quiz-container {
        margin: 20px;
        padding: 25px;
      }

      .quiz-header h1 {
        font-size: 2.2rem;
      }

      .navegador-quiz {
        flex-direction: column;
      }

      .pregunta-texto {
        font-size: 1.16rem;
      }
    }
  </style>
</head>
<body>

<div class="quiz-container">
  <div class="quiz-header">
    <i class="fas fa-star fa-3x" style="color: #ffd54f;"></i>
    <h1>Mini-Quiz</h1>
    <p class="lead">Reconocer fracciones · Nivel Fácil</p>
    <span class="badge-nivel">⭐ 5 preguntas · necesitas al menos 4 correctas</span>
  </div>

  <div class="timer-container">
    <span class="timer-label"><i class="fas fa-hourglass-half me-2"></i>Tiempo:</span>
    <span class="timer-value" id="timerDisplay">00:00</span>
  </div>

  <div class="progreso-quiz" id="progresoQuiz">
    <div class="punto activo" data-i="0">1</div>
    <div class="punto" data-i="1">2</div>
    <div class="punto" data-i="2">3</div>
    <div class="punto" data-i="3">4</div>
    <div class="punto" data-i="4">5</div>
  </div>

  <div id="preguntasContainer"></div>

  <div class="navegador-quiz" id="navBotones">
    <button class="btn-nav" id="btnAnterior" onclick="cambiarPregunta(-1)" disabled>← Anterior</button>
    <span class="contador" id="contadorPregunta">1/5</span>
    <button class="btn-nav" id="btnSiguiente" onclick="cambiarPregunta(1)">Siguiente →</button>
    <button class="btn-nav" id="btnEnviar" onclick="enviarQuiz()" style="display: none;">Enviar</button>
  </div>

  <div class="resultado" id="resultado">
    <div class="resultado-emoji" id="resultadoEmoji">🏆</div>
    <div class="resultado-titulo" id="resultadoTitulo">¡Lo lograste!</div>
    <div class="resultado-puntaje" id="resultadoPuntaje">5/5</div>
    <p class="mb-4" id="resultadoMensaje"></p>
    <p class="text-white-50" id="resultadoTiempo"></p>

    <button class="btn-accion" onclick="volverAlContenido()">
      <i class="fas fa-arrow-left me-2"></i>Volver
    </button>

    <button class="btn-accion" id="btnSiguienteNivel" onclick="irSiguienteNivel()" style="display: none;">
      Nivel normal <i class="fas fa-arrow-right ms-2"></i>
    </button>

    <button class="btn-accion" id="btnReintentar" onclick="reiniciarQuiz()" style="display: none;">
      <i class="fas fa-redo me-2"></i>Reintentar
    </button>
  </div>
</div>

<script>
  let fechaInicio = new Date();
  let timerInterval = null;
  let estiloUsuario = null;

  const preguntas = [
    {
      texto: "Observa la unidad. ¿Qué fracción representa la parte coloreada?",
      figura: "barra",
      partes: 5,
      pintadas: 3,
      opciones: ["3/5", "5/3", "2/5", "3/4"],
      correcta: 0,
      explicacion: "La unidad se dividió en 5 partes iguales y 3 están coloreadas. Por eso representa 3/5."
    },
    {
      texto: "Dos estudiantes quisieron representar 2/4. ¿En cuál figura sí está bien representada esa fracción?",
      figura: "comparacionDivision",
      opciones: ["Solo en la figura A", "Solo en la figura B", "En las dos figuras", "En ninguna figura"],
      correcta: 0,
      explicacion: "La fracción debe representarse con una unidad dividida en partes iguales. En la figura A sí ocurre eso."
    },
    {
      texto: "¿Cuál afirmación describe correctamente a 3/4?",
      figura: "fraccionPanel",
      numerador: 3,
      denominador: 4,
      opciones: [
        "El numerador es 3 y el denominador es 4",
        "El denominador es 3 y el numerador es 4",
        "El numerador y el denominador valen 3",
        "No se puede saber cuál es cuál"
      ],
      correcta: 0,
      explicacion: "En 3/4, el numerador es 3 y el denominador es 4."
    },
    {
      texto: "Si una unidad está dividida en 6 partes iguales y se toman 4 partes, ¿cuál es la fracción correcta?",
      figura: "barra",
      partes: 6,
      pintadas: 4,
      opciones: ["4/6", "6/4", "2/6", "4/5"],
      correcta: 0,
      explicacion: "Se toman 4 partes de un total de 6 partes iguales. Eso representa 4/6."
    },
    {
      texto: "Observa la recta numérica. ¿Qué fracción señala el punto amarillo?",
      figura: "rectaSinPista",
      puntoPosicion: 72,
      opciones: ["1/4", "2/4", "3/4", "1"],
      correcta: 2,
      explicacion: "La unidad va de 0 a 1 y está dividida en 4 partes iguales. El punto está en la tercera marca interior: 3/4."
    }
  ];

  let preguntaActual = 0;
  let respuestas = new Array(preguntas.length).fill(null);
  let aciertos = 0;

  const TOTAL = preguntas.length;
  const MINIMO = 4;

  async function obtenerEstiloUsuario() {
    try {
      const res = await fetch('/api/usuario/estilo', { credentials: 'include' });
      const data = await res.json();
      estiloUsuario = data.estilo || 'visual_verbal';
    } catch (e) {
      estiloUsuario = 'visual_verbal';
    }
  }

  function actualizarTimer() {
    const ahora = new Date();
    const diferencia = Math.floor((ahora - fechaInicio) / 1000);
    const minutos = Math.floor(diferencia / 60);
    const segundos = diferencia % 60;
    document.getElementById('timerDisplay').innerText =
      `${minutos.toString().padStart(2, '0')}:${segundos.toString().padStart(2, '0')}`;
  }

  function renderBarra(partes, pintadas, desigual = false) {
    let partesHTML = '';
    for (let i = 0; i < partes; i++) {
      partesHTML += `<div class="parte ${i < pintadas ? 'pintada' : ''}"></div>`;
    }
    return `<div class="barra-fraccion ${desigual ? 'desigual' : ''}">${partesHTML}</div>`;
  }

  function renderFigura(pregunta) {
    if (!pregunta.figura) return '';

    if (pregunta.figura === 'barra') {
      return `
        <div class="figura-wrap">
          ${renderBarra(pregunta.partes, pregunta.pintadas)}
        </div>
      `;
    }

    if (pregunta.figura === 'comparacionDivision') {
      return `
        <div class="figura-wrap">
          <div class="figura-col">
            ${renderBarra(4, 2, false)}
            <div class="etiqueta-figura">Figura A</div>
          </div>
          <div class="figura-col">
            ${renderBarra(4, 2, true)}
            <div class="etiqueta-figura">Figura B</div>
          </div>
        </div>
      `;
    }

    if (pregunta.figura === 'fraccionPanel') {
      return `
        <div class="fraccion-panel">
          <div class="fraccion-grande">
            <span>${pregunta.numerador}</span>
            <span class="linea"></span>
            <span>${pregunta.denominador}</span>
          </div>
        </div>
      `;
    }

    if (pregunta.figura === 'rectaSinPista') {
      return `
        <div class="figura-wrap">
          <div class="recta-wrap">
            <div class="linea-recta"></div>

            <div class="marca" style="left: 6%;"><span>0</span></div>
            <div class="marca" style="left: 28%;"></div>
            <div class="marca" style="left: 50%;"></div>
            <div class="marca" style="left: 72%;"></div>
            <div class="marca" style="left: 94%;"><span>1</span></div>

            <div class="punto-fraccion" style="left: ${pregunta.puntoPosicion}%;"></div>
          </div>
        </div>
      `;
    }

    return '';
  }

  function mostrarPregunta() {
    const container = document.getElementById('preguntasContainer');
    const p = preguntas[preguntaActual];
    const respondida = respuestas[preguntaActual] !== null;
    const esCorrecta = respondida ? respuestas[preguntaActual] === p.correcta : false;

    let opcionesHTML = '';
    p.opciones.forEach((opcion, idx) => {
      let claseBtn = 'opcion-btn';
      if (respondida) {
        if (idx === p.correcta) claseBtn += ' correcta';
        if (idx === respuestas[preguntaActual] && idx !== p.correcta) claseBtn += ' incorrecta';
      }

      opcionesHTML += `
        <button class="${claseBtn}"
                onclick="seleccionarRespuesta(${preguntaActual}, ${idx})"
                ${respondida ? 'disabled' : ''}>
          ${String.fromCharCode(65 + idx)}) ${opcion}
        </button>
      `;
    });

    container.innerHTML = `
      <div class="tarjeta-pregunta">
        <div class="pregunta-numero">PREGUNTA ${preguntaActual + 1} DE ${TOTAL}</div>
        <div class="pregunta-texto">${p.texto}</div>
        ${renderFigura(p)}
        <div class="opciones">${opcionesHTML}</div>
        <div class="feedback ${respondida ? 'visible' : ''} ${esCorrecta ? 'correcto' : 'incorrecto'}">
          ${respondida ? (esCorrecta ? '✅ ' + p.explicacion : '❌ ' + p.explicacion) : ''}
        </div>
      </div>
    `;

    actualizarPuntos();
    document.getElementById('contadorPregunta').innerText = `${preguntaActual + 1}/${TOTAL}`;
    actualizarBotones();
  }

  function seleccionarRespuesta(idxPregunta, idxOpcion) {
    if (respuestas[idxPregunta] !== null) return;

    respuestas[idxPregunta] = idxOpcion;
    if (idxOpcion === preguntas[idxPregunta].correcta) {
      aciertos++;
    }

    document.querySelectorAll('.punto')[idxPregunta].classList.add('respondido');
    mostrarPregunta();
  }

  function cambiarPregunta(direccion) {
    if (direccion === -1 && preguntaActual > 0) {
      preguntaActual--;
      mostrarPregunta();
    } else if (direccion === 1 && preguntaActual < TOTAL - 1) {
      if (respuestas[preguntaActual] !== null) {
        preguntaActual++;
        mostrarPregunta();
      }
    }
  }

  function actualizarPuntos() {
    document.querySelectorAll('.punto').forEach((punto, i) => {
      punto.classList.remove('activo');
      if (i === preguntaActual) punto.classList.add('activo');
    });
  }

  function actualizarBotones() {
    const btnAnterior = document.getElementById('btnAnterior');
    const btnSiguiente = document.getElementById('btnSiguiente');
    const btnEnviar = document.getElementById('btnEnviar');

    btnAnterior.disabled = (preguntaActual === 0);

    if (preguntaActual === TOTAL - 1) {
      btnSiguiente.style.display = 'none';
      btnEnviar.style.display = 'inline-block';
    } else {
      btnSiguiente.style.display = 'inline-block';
      btnEnviar.style.display = 'none';
    }
  }

  async function enviarQuiz() {
    const sinResponder = respuestas.filter(r => r === null).length;
    if (sinResponder > 0) {
      alert(`Aún te faltan ${sinResponder} pregunta(s) por responder.`);
      return;
    }

    if (timerInterval) clearInterval(timerInterval);

    const fechaFin = new Date();
    const tiempoSegundos = Math.round((fechaFin - fechaInicio) / 1000);

    document.getElementById('preguntasContainer').style.display = 'none';
    document.getElementById('progresoQuiz').style.display = 'none';
    document.getElementById('navBotones').style.display = 'none';

    const resultado = document.getElementById('resultado');
    resultado.classList.add('visible');

    const aprobado = aciertos >= MINIMO;
    const pct = Math.round((aciertos / TOTAL) * 100);

    document.getElementById('resultadoPuntaje').innerHTML = `${aciertos}/${TOTAL}`;
    document.getElementById('resultadoEmoji').innerHTML = aprobado ? '🏆' : '📚';
    document.getElementById('resultadoTiempo').innerHTML = `⏱️ Tiempo: ${tiempoSegundos} segundos`;

    if (aprobado) {
      document.getElementById('resultadoTitulo').innerHTML = '¡Excelente!';
      document.getElementById('resultadoMensaje').innerHTML =
        `Obtuviste ${pct}%. ¡Muy bien! El nivel normal está desbloqueado.`;
      document.getElementById('btnSiguienteNivel').style.display = 'inline-block';
      document.getElementById('btnReintentar').style.display = 'none';
      await guardarProgreso(aciertos, TOTAL, tiempoSegundos, true);
    } else {
      document.getElementById('resultadoTitulo').innerHTML = 'Sigue practicando';
      document.getElementById('resultadoMensaje').innerHTML =
        `Obtuviste ${pct}%. Necesitas al menos ${MINIMO} de ${TOTAL} para avanzar.`;
      document.getElementById('btnSiguienteNivel').style.display = 'none';
      document.getElementById('btnReintentar').style.display = 'inline-block';
      await guardarProgreso(aciertos, TOTAL, tiempoSegundos, false);
    }
  }

  async function guardarProgreso(aciertos, total, tiempoSegundos, aprobado) {
    try {
      await fetch('/api/progreso/nivel', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({
          contenido_id: 6,
          nivel_completado: 'facil',
          puntaje: Math.round((aciertos / total) * 100),
          aprobado: aprobado,
          aciertos: aciertos,
          total_preguntas: total,
          tiempo_segundos: tiempoSegundos,
          fecha_inicio: fechaInicio.toISOString()
        })
      });
    } catch (e) {
      console.error('Error guardando progreso:', e);
    }
  }

  function reiniciarQuiz() {
    preguntaActual = 0;
    respuestas = new Array(preguntas.length).fill(null);
    aciertos = 0;
    fechaInicio = new Date();

    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(actualizarTimer, 1000);

    document.querySelectorAll('.punto').forEach((punto, i) => {
      punto.classList.remove('respondido', 'activo');
      if (i === 0) punto.classList.add('activo');
    });

    document.getElementById('preguntasContainer').style.display = 'block';
    document.getElementById('progresoQuiz').style.display = 'flex';
    document.getElementById('navBotones').style.display = 'flex';
    document.getElementById('resultado').classList.remove('visible');

    mostrarPregunta();
  }

  function volverAlContenido() {
    window.location.href = '/contenidos/matematicas/reconocer-fracciones/menu.html';
  }

  async function irSiguienteNivel() {
    if (!estiloUsuario) await obtenerEstiloUsuario();
    window.location.href = `../normal/${estiloUsuario}.html`;
  }

  (async function init() {
    await obtenerEstiloUsuario();
    mostrarPregunta();
    timerInterval = setInterval(actualizarTimer, 1000);
  })();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
