<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>
    <link rel="stylesheet" href="styles-index-crearcuenta.css">
</head>

<body>
    <div class="contenedor">
        <div class="imagenlogo">
            <img src="recursos/logo.jpg" alt="logo">
        </div>

        <form id="forminiciarsesion">
            <h2>Iniciar sesión</h2>
            <input type="text" name="usuario" placeholder="Usuario" required>
            <input type="password" name="contraseña" placeholder="Contraseña" required>
            <button type="submit" id="botoniniciarsesion">Iniciar sesión</button>
            <a href="crearcuenta.html" class="enlace">¿No tienes una cuenta? <span>Crear cuenta</span></a>
        </form>
    </div>

    <script src="configClient.js"></script>
    <script src="script.js"></script>
</body>

</html>
