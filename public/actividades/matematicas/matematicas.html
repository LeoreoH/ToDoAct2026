<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problemas Matemáticos</title>
    <link rel="stylesheet" href="styles-matematicas.css">
</head>

<body>
    <header class="math-header">
        <button class="boton-volver" onclick="volverAInicio()">← Volver</button>
        <h1>Problemas Matemáticos</h1>
    </header>

    <div class="contenedor-actividad">
        <div id="seleccion-nivel">
            <h2>Selecciona un nivel</h2>
            <div class="contenedor-niveles">
                <button id="nivel-facil" onclick="iniciarActividad(1)"></button>
                <button id="nivel-medio" onclick="iniciarActividad(2)" disabled></button>
                <button id="nivel-dificil" onclick="iniciarActividad(3)" disabled></button>
            </div>
        </div>
        <div id="actividad-matematica" style="display: none;">
            <div class="puntuacion-container">
                <div class="puntuacion-item">
                    <div id="puntuacion-total" class="puntuacion-valor">0</div>
                    <div class="puntuacion-etiqueta">Puntos</div>
                </div>
                <div class="puntuacion-item">
                    <div id="ejercicios-resueltos" class="puntuacion-valor">0/0</div>
                    <div class="puntuacion-etiqueta">Progreso</div>
                </div>
            </div>
            <p id="nivel-actual"></p>
            <p id="problema-matematico"></p>
            <div id="contenedor-respuestas"></div>
            <p id="resultado"></p>
        </div>
    </div>

    <script src="configClient.js"></script>
    <script src="actividad-matematicas.js"></script>
</body>
</html>
