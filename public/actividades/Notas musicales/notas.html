<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secuencias Musicales</title>
    <link rel="stylesheet" href="estilosN.css">
</head>

<body>
    <div class="game-header">
        <button class="boton-volver" onclick="volverAInicio()">← Volver</button>
        <h1>Secuencias Musicales</h1>
    </div>
    <div id="game-container">
        <div id="stats">
            <div id="level-display">Nivel: 1</div>
            <div id="time-display">Tiempo: 0s</div>
            <div id="errors-display">Errores: 0</div>
            <div id="sequence-length-display">Notas faltantes: 0</div>
        </div>
        <div id="sequence-display"></div>
        <div id="instrument-buttons">
            <button id="note1" class="instrument" data-note="do">Do</button>
            <button id="note2" class="instrument" data-note="re">Re</button>
            <button id="note3" class="instrument" data-note="mi">Mi</button>
            <button id="note4" class="instrument" data-note="fa">Fa</button>
            <button id="note5" class="instrument" data-note="sol">Sol</button>
        </div>
        <button id="start-button">Comenzar</button>
        <div id="feedback"></div>
    </div>

    <script src="configClient.js"></script>
    <script src="logicaN.js"></script>
</body>

</html>
