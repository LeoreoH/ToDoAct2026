<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sopa de Letras</title>
    <link rel="stylesheet" href="estilos.css">
</head>

<body>
    <header class="game-header">
        <button class="boton-volver" onclick="navegarAtras()">← Volver</button>
        <h1>Sopa de Letras</h1>
    </header>

    <div id="categorias">
        <h2>Selecciona una categoría</h2>
        <div class="opciones-categoria">
            <div class="categoria" onclick="seleccionarCategoria('animales')">
                <img src="imagenes/categorias/cat-animales.png" alt="Animales">
                <p>Animales</p>
            </div>
            <div class="categoria" onclick="seleccionarCategoria('frutas')">
                <img src="imagenes/categorias/cat-frutas.png" alt="Frutas">
                <p>Frutas</p>
            </div>
            <div class="categoria" onclick="seleccionarCategoria('paises')">
                <img src="imagenes/categorias/cat-paises.png" alt="paises">
                <p>Paises</p>
            </div>
            <div class="categoria" onclick="seleccionarCategoria('deportes')">
                <img src="imagenes/categorias/cat-deportes.png" alt="deportes">
                <p>Deportes</p>
            </div>
            <div class="categoria" onclick="seleccionarCategoria('profesiones')">
                <img src="imagenes/categorias/cat-profesiones.png" alt="profesiones">
                <p>Profesiones</p>
            </div>
            <div class="categoria" onclick="seleccionarCategoria('instrumentos')">
                <img src="imagenes/categorias/cat-instrumentos.png" alt="instrumentos">
                <p>Instrumentos</p>
            </div>
            <div class="categoria" onclick="seleccionarCategoria('transportes')">
                <img src="imagenes/categorias/cat-transportes.png" alt="transportes">
                <p>Transportes</p>
            </div>
            <div class="categoria" onclick="seleccionarCategoria('verduras')">
                <img src="imagenes/categorias/cat-verduras.png" alt="verduras">
                <p>Verduras</p>
            </div>
            <div class="categoria" onclick="seleccionarCategoria('tecnologia')">
                <img src="imagenes/categorias/cat-tecnologia.png" alt="tecnologia">
                <p>Tecnologia</p>
            </div>
            <div class="categoria" onclick="seleccionarCategoria('espacio')">
                <img src="imagenes/categorias/cat-espacio.png" alt="espacio">
                <p>Espacio</p>
            </div>
            <div class="categoria" onclick="seleccionarCategoria('medios')">
                <img src="imagenes/categorias/cat-medios.png" alt="medios">
                <p>Medios</p>
            </div>
            <div class="categoria" onclick="seleccionarCategoria('emociones')">
                <img src="imagenes/categorias/cat-emociones.png" alt="emociones">
                <p>Emociones</p>
            </div>
            <div class="categoria" onclick="seleccionarCategoria('Herramientas')">
                <img src="imagenes/categorias/cat-herramientas.png" alt="Herramientas">
                <p>Herramientas</p>
            </div>
            <div class="categoria" onclick="seleccionarCategoria('clima')">
                <img src="imagenes/categorias/cat-clima.png" alt="clima">
                <p>Clima</p>
            </div>
        </div>
    </div>

    <div id="niveles" style="display: none;">
        <h2>Selecciona un nivel</h2>
        <div class="contenedor-niveles">
            <button id="nivel-facil" onclick="iniciarJuego(1)"></button>
            <button id="nivel-medio" onclick="iniciarJuego(2)" disabled></button>
            <button id="nivel-dificil" onclick="iniciarJuego(3)" disabled></button>
        </div>
    </div>

    <div id="juego" style="display: none;">
        <div class="controles-juego">
            <p>⏱️ Tiempo: <span id="tiempo">0</span>s</p>
            <p>🔍 Encontradas: <span id="palabras-encontradas">0</span>/<span id="total-palabras">0</span></p>
        </div>
        <div class="tabla-container">
            <div id="tablero"></div>
        </div>
        <ul id="palabras"></ul>
    </div>

    <script src="configClient.js"></script>
    <script src="logica.js"></script>
</body>
</html>
