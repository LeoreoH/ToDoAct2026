<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema solar</title>
<link rel="stylesheet" href="menu.css">
</head>

<body>

<header class="astro-header">
    <button class="boton-volver" onclick="volver()">← Volver</button>
    <h1>Sistema Solar</h1>
</header>

<div class="contenedor-actividad">

    <h2>Elige una opción</h2>

    <div class="contenedor-niveles">

        <!-- EXAMEN -->
        <button id="btn-diagnostico" onclick="irADiagnostico()">
            <span>Examen diagnóstico</span>
            <span class="descripcion-nivel">
                Descubre tu nivel inicial
            </span>
        </button>

        <!-- CONTENIDOS -->
        <button onclick="mostrarContenidos()">
            <span>Contenidos</span>
            <span class="descripcion-nivel">
                Accede a los niveles del contenido
            </span>
        </button>

        <!-- EJERCICIOS -->
        <button onclick="irAEjercicios()">
            <span>Ejercicios</span>
            <span class="descripcion-nivel">
                Practica lo aprendido
            </span>
        </button>

    </div>


    <!-- SUBMENÚ CONTENIDOS -->
    <div id="bloque-contenidos" style="display:none">

        <h3>Niveles del contenido</h3>

        <div class="contenedor-niveles">

            <button id="btn-facil" onclick="abrirNivel('facil')" disabled></button>
            <button id="btn-normal" onclick="abrirNivel('normal')" disabled></button>
            <button id="btn-dificil" onclick="abrirNivel('dificil')" disabled></button>

        </div>

    </div>

</div>

<script src="../../../configClient.js"></script>
<script src="menu.js"></script>
</body>
</html>
