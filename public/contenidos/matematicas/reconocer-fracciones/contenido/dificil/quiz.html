<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz · Fracciones · Nivel Difícil</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #8e24aa, #5e35b1);
      min-height: 100vh;
      color: white;
    }

    .quiz-container {
      max-width: 940px;
      margin: 40px auto;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 40px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      border: 4px solid #ffd54f;
    }

    .quiz-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .quiz-header h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 3rem;
      color: #ffd54f;
      text-shadow: 3px 3px 0 #4a148c;
      margin-bottom: 8px;
    }

    .badge-nivel {
      background: #4a148c;
      color: white;
      padding: 8px 25px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1.05rem;
      display: inline-block;
      border: 2px solid #ffd54f;
    }

    .timer-container {
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 10px 20px;
      margin: 20px 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 2px solid #ffd54f;
    }

    .timer-label {
      font-size: 1.05rem;
      font-weight: 700;
    }

    .timer-value {
      font-size: 1.3rem;
      font-weight: 800;
      color: #ffd54f;
      font-family: monospace;
    }

    .progreso-quiz {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 18px 0 28px;
      flex-wrap: wrap;
    }

    .punto {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: 3px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.05rem;
      color: white;
      transition: all 0.25s;
    }

    .punto.activo {
      background: #ffd54f;
      color: #4a148c;
      transform: scale(1.15);
    }

    .punto.respondido {
      background: #4caf50;
      color: white;
    }

    .tarjeta-pregunta {
      background: white;
      border-radius: 30px;
      padding: 30px;
      margin-bottom: 22px;
      border: 4px solid #ffd54f;
      box-shadow: 0 8px 0 #d39e00;
      color: #4a148c;
    }

    .pregunta-numero {
      font-size: 1rem;
      color: #7b1fa2;
      font-weight: 800;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .pregunta-texto {
      font-size: 1.28rem;
      font-weight: 700;
      line-height: 1.45;
      margin-bottom: 18px;
    }

    .visual-apoyo {
      background: #faf5ff;
      border: 3px solid #d1a6ff;
      border-radius: 24px;
      padding: 18px;
      margin: 0 0 20px;
      overflow-x: auto;
    }

    .opciones {
      display: grid;
      gap: 12px;
    }

    .opcion-btn {
      background: #f3e5f5;
      border: 3px solid #7b1fa2;
      border-radius: 18px;
      padding: 15px 18px;
      color: #4a148c;
      font-weight: 700;
      font-size: 1.02rem;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }

    .opcion-btn:hover:not(:disabled) {
      background: #ffd54f;
      border-color: #4a148c;
      transform: translateY(-1px);
    }

    .opcion-btn.correcta {
      background: #43a047;
      color: white;
      border-color: white;
    }

    .opcion-btn.incorrecta {
      background: #e53935;
      color: white;
      border-color: white;
    }

    .opcion-btn:disabled {
      cursor: not-allowed;
      opacity: 0.98;
    }

    .feedback {
      margin-top: 20px;
      padding: 15px 16px;
      border-radius: 16px;
      font-weight: 700;
      display: none;
      line-height: 1.45;
    }

    .feedback.visible { display: block; }
    .feedback.correcto {
      background: #c8e6c9;
      color: #1b5e20;
      border-left: 8px solid #2e7d32;
    }
    .feedback.incorrecto {
      background: #ffcdd2;
      color: #b71c1c;
      border-left: 8px solid #c62828;
    }

    .ayuda-nav {
      text-align: center;
      color: rgba(255,255,255,0.9);
      font-weight: 700;
      margin-top: -6px;
      margin-bottom: 10px;
      min-height: 26px;
    }

    .navegador-quiz {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 24px;
      gap: 15px;
      flex-wrap: wrap;
    }

    .btn-nav {
      background: #ffd54f;
      color: #4a148c;
      border: none;
      padding: 12px 28px;
      border-radius: 40px;
      font-weight: 800;
      font-size: 1.1rem;
      border: 3px solid white;
      transition: all 0.2s;
    }

    .btn-nav:hover:not(:disabled) {
      background: white;
      transform: scale(1.04);
    }

    .btn-nav:disabled {
      background: #b0bec5;
      opacity: 0.55;
      cursor: not-allowed;
    }

    .contador {
      background: #4a148c;
      color: white;
      padding: 8px 25px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1.05rem;
      border: 2px solid #ffd54f;
    }

    .resultado {
      text-align: center;
      padding: 30px;
      display: none;
    }

    .resultado.visible { display: block; }

    .resultado-emoji {
      font-size: 5rem;
      margin-bottom: 15px;
    }

    .resultado-titulo {
      font-family: 'Fredoka One', cursive;
      font-size: 2.4rem;
      color: #ffd54f;
      margin-bottom: 15px;
    }

    .resultado-puntaje {
      font-size: 4rem;
      font-weight: 900;
      color: white;
      background: #4a148c;
      display: inline-block;
      padding: 20px 50px;
      border-radius: 60px;
      margin: 18px 0;
      border: 4px solid #ffd54f;
    }

    .btn-accion {
      background: #ffd54f;
      color: #4a148c;
      border: none;
      padding: 15px 40px;
      border-radius: 60px;
      font-weight: 800;
      font-size: 1.1rem;
      margin: 10px;
      border: 4px solid white;
      transition: all 0.2s;
    }

    .btn-accion:hover {
      transform: scale(1.05);
      background: white;
    }

    .leyenda-mini {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px 18px;
      font-size: 0.96rem;
      color: #5e35b1;
      font-weight: 700;
      margin-top: 10px;
    }

    @media (max-width: 768px) {
      .quiz-container {
        margin: 18px;
        padding: 24px;
      }

      .quiz-header h1 { font-size: 2.2rem; }
      .pregunta-texto { font-size: 1.12rem; }
      .navegador-quiz { flex-direction: column; }
      .resultado-puntaje { font-size: 3rem; padding: 18px 34px; }
    }
  </style>
</head>
<body>

<div class="quiz-container">
  <div class="quiz-header">
    <i class="fas fa-star fa-3x" style="color: #ffd54f;"></i>
    <h1>Mini-Quiz</h1>
    <p class="lead mb-2">Fracciones · Nivel Difícil</p>
    <span class="badge-nivel" id="badgeNivel"></span>
  </div>

  <div class="timer-container">
    <span class="timer-label"><i class="fas fa-hourglass-half me-2"></i> Tiempo:</span>
    <span class="timer-value" id="timerDisplay">00:00</span>
  </div>

  <div class="progreso-quiz" id="progresoQuiz"></div>

  <div id="preguntasContainer"></div>
  <div class="ayuda-nav" id="ayudaNav"></div>

  <div class="navegador-quiz" id="navBotones">
    <button class="btn-nav" id="btnAnterior" onclick="cambiarPregunta(-1)" disabled>← Anterior</button>
    <span class="contador" id="contadorPregunta">1/10</span>
    <button class="btn-nav" id="btnSiguiente" onclick="cambiarPregunta(1)" disabled>Siguiente →</button>
    <button class="btn-nav" id="btnEnviar" onclick="enviarQuiz()" style="display: none;">Enviar</button>
  </div>

  <div class="resultado" id="resultado">
    <div class="resultado-emoji" id="resultadoEmoji">🏆</div>
    <div class="resultado-titulo" id="resultadoTitulo">¡Lo lograste!</div>
    <div class="resultado-puntaje" id="resultadoPuntaje">10/10</div>
    <p class="mb-4 fs-5" id="resultadoMensaje"></p>
    <p class="text-white-50" id="resultadoTiempo"></p>
    <button class="btn-accion" onclick="volverAlContenido()">
      <i class="fas fa-arrow-left me-2"></i> Volver
    </button>
    <button class="btn-accion" id="btnReintentar" onclick="reiniciarQuiz()" style="display: none;">
      <i class="fas fa-redo me-2"></i> Reintentar
    </button>
  </div>
</div>

<script>
  let fechaInicio = new Date();
  let timerInterval = null;
  let estiloUsuario = null;

  const preguntas = [
    {
      texto: 'En una cooperativa escolar se prepararon 8 rebanadas iguales de pizza. Ya se vendieron 6. ¿Qué fracción de la pizza se vendió?',
      visual: `
        <div class="visual-apoyo">
          <svg width="100%" height="180" viewBox="0 0 520 180" xmlns="http://www.w3.org/2000/svg">
            <circle cx="120" cy="90" r="70" fill="#ffe082" stroke="#6d4c41" stroke-width="4"/>
            <g stroke="#6d4c41" stroke-width="4">
              <line x1="120" y1="90" x2="120" y2="20"/>
              <line x1="120" y1="90" x2="169.5" y2="40.5"/>
              <line x1="120" y1="90" x2="190" y2="90"/>
              <line x1="120" y1="90" x2="169.5" y2="139.5"/>
              <line x1="120" y1="90" x2="120" y2="160"/>
              <line x1="120" y1="90" x2="70.5" y2="139.5"/>
              <line x1="120" y1="90" x2="50" y2="90"/>
              <line x1="120" y1="90" x2="70.5" y2="40.5"/>
            </g>
            <text x="245" y="74" font-size="22" font-weight="800" fill="#4a148c">Pizza dividida en 8 partes iguales</text>
            <text x="245" y="110" font-size="20" font-weight="700" fill="#5e35b1">Se vendieron 6 rebanadas</text>
          </svg>
        </div>`,
      opciones: ['6/8', '8/6', '2/8', '6/6'],
      correcta: 0,
      explicacion: 'Se vendieron 6 partes de un total de 8, por eso la fracción es 6/8.'
    },
    {
      texto: 'En una carrera, Ana recorrió 3/4 del trayecto y Luis 5/8. ¿Quién avanzó más?',
      opciones: ['Ana, porque 3/4 es mayor que 5/8', 'Luis, porque 5 es mayor que 3', 'Avanzaron lo mismo', 'No se puede comparar'],
      correcta: 0,
      explicacion: 'Si conviertes 3/4 a octavos obtienes 6/8. Como 6/8 es mayor que 5/8, Ana avanzó más.'
    },
    {
      texto: 'Observa la recta. ¿Qué fracción está mejor ubicada en el punto marcado?',
      visual: `
        <div class="visual-apoyo">
          <svg width="100%" height="170" viewBox="0 0 620 170" xmlns="http://www.w3.org/2000/svg">
            <line x1="60" y1="95" x2="560" y2="95" stroke="#4a148c" stroke-width="6" stroke-linecap="round"/>
            <g stroke="#4a148c" stroke-width="4">
              <line x1="60" y1="76" x2="60" y2="114"/>
              <line x1="122.5" y1="82" x2="122.5" y2="108"/>
              <line x1="185" y1="82" x2="185" y2="108"/>
              <line x1="247.5" y1="82" x2="247.5" y2="108"/>
              <line x1="310" y1="76" x2="310" y2="114"/>
              <line x1="372.5" y1="82" x2="372.5" y2="108"/>
              <line x1="435" y1="82" x2="435" y2="108"/>
              <line x1="497.5" y1="82" x2="497.5" y2="108"/>
              <line x1="560" y1="76" x2="560" y2="114"/>
            </g>
            <circle cx="435" cy="95" r="14" fill="#ff7043" stroke="white" stroke-width="4"/>
            <text x="53" y="142" font-size="22" font-weight="800" fill="#4a148c">0</text>
            <text x="300" y="142" font-size="22" font-weight="800" fill="#4a148c">1/2</text>
            <text x="552" y="142" font-size="22" font-weight="800" fill="#4a148c">1</text>
          </svg>
          <div class="leyenda-mini">
            <span>La recta está dividida en 8 partes iguales.</span>
          </div>
        </div>`,
      opciones: ['3/8', '5/8', '6/8', '7/8'],
      correcta: 2,
      explicacion: 'Del 0 al 1 hay 8 partes iguales. El punto está en la sexta marca desde 0, así que representa 6/8.'
    },
    {
      texto: 'En una receta se usa 1/2 taza de avena y luego 2/8 de taza de semillas. ¿Qué afirmación es correcta?',
      opciones: ['Se usó más avena que semillas', 'Se usó la misma cantidad de avena y semillas', 'Se usaron más semillas que avena', 'No se puede comparar'],
      correcta: 0,
      explicacion: '1/2 equivale a 4/8. Como 4/8 es mayor que 2/8, se usó más avena.'
    },
    {
      texto: '¿Cuál de estas fracciones es equivalente a 3/4?',
      opciones: ['6/10', '9/12', '8/12', '12/16'],
      correcta: 1,
      explicacion: '3/4 y 9/12 representan la misma cantidad porque se multiplicó numerador y denominador por 3.'
    },
    {
      texto: 'Una jardinera llenó 2/3 de una cubeta con agua. Otra llenó 3/5 de su cubeta del mismo tamaño. ¿Cuál cubeta tiene más agua?',
      opciones: ['La de 2/3', 'La de 3/5', 'Tienen la misma cantidad', 'No se puede saber'],
      correcta: 0,
      explicacion: 'Puedes comparar con quinceavos: 2/3 = 10/15 y 3/5 = 9/15. Entonces 2/3 es mayor.'
    },
    {
      texto: 'Observa las tiras. ¿Qué opción ordena de menor a mayor las cantidades representadas?',
      visual: `
        <div class="visual-apoyo">
          <svg width="100%" height="200" viewBox="0 0 620 200" xmlns="http://www.w3.org/2000/svg">
            <text x="18" y="48" font-size="24" font-weight="800" fill="#4a148c">A</text>
            <rect x="55" y="22" width="420" height="28" rx="8" fill="#ede7f6" stroke="#5e35b1" stroke-width="3"/>
            <rect x="55" y="22" width="315" height="28" rx="8" fill="#ffcc80"/>
            <g stroke="#5e35b1" stroke-width="2">
              <line x1="160" y1="22" x2="160" y2="50"/>
              <line x1="265" y1="22" x2="265" y2="50"/>
              <line x1="370" y1="22" x2="370" y2="50"/>
            </g>
            <text x="500" y="44" font-size="20" font-weight="700" fill="#5e35b1">3/4</text>

            <text x="18" y="104" font-size="24" font-weight="800" fill="#4a148c">B</text>
            <rect x="55" y="78" width="420" height="28" rx="8" fill="#ede7f6" stroke="#5e35b1" stroke-width="3"/>
            <rect x="55" y="78" width="262.5" height="28" rx="8" fill="#80deea"/>
            <g stroke="#5e35b1" stroke-width="2">
              <line x1="125" y1="78" x2="125" y2="106"/>
              <line x1="195" y1="78" x2="195" y2="106"/>
              <line x1="265" y1="78" x2="265" y2="106"/>
              <line x1="335" y1="78" x2="335" y2="106"/>
              <line x1="405" y1="78" x2="405" y2="106"/>
            </g>
            <text x="500" y="100" font-size="20" font-weight="700" fill="#5e35b1">5/8</text>

            <text x="18" y="160" font-size="24" font-weight="800" fill="#4a148c">C</text>
            <rect x="55" y="134" width="420" height="28" rx="8" fill="#ede7f6" stroke="#5e35b1" stroke-width="3"/>
            <rect x="55" y="134" width="280" height="28" rx="8" fill="#a5d6a7"/>
            <g stroke="#5e35b1" stroke-width="2">
              <line x1="148.33" y1="134" x2="148.33" y2="162"/>
              <line x1="241.66" y1="134" x2="241.66" y2="162"/>
              <line x1="335" y1="134" x2="335" y2="162"/>
              <line x1="428.33" y1="134" x2="428.33" y2="162"/>
            </g>
            <text x="500" y="156" font-size="20" font-weight="700" fill="#5e35b1">2/3</text>
          </svg>
        </div>`,
      opciones: ['B, C, A', 'C, B, A', 'B, A, C', 'A, C, B'],
      correcta: 0,
      explicacion: '5/8 = 0.625, 2/3 ≈ 0.666 y 3/4 = 0.75. Entonces el orden correcto es B, C, A.'
    },
    {
      texto: 'En una excursión, un grupo recorrió 4/8 del camino por la mañana y otro grupo 1/2 del camino. ¿Qué relación hay entre ambas distancias?',
      opciones: ['4/8 es menor que 1/2', '4/8 es mayor que 1/2', 'Son equivalentes', 'No se pueden comparar'],
      correcta: 2,
      explicacion: '4/8 se simplifica a 1/2, así que representan la misma distancia.'
    },
    {
      texto: 'Una bandeja de fruta se dividió en 10 porciones iguales. Se sirvieron 7. ¿Qué fracción faltó por servir?',
      opciones: ['7/10', '3/10', '10/7', '1/3'],
      correcta: 1,
      explicacion: 'Si se sirvieron 7 de 10, quedan 3 de 10 por servir.'
    },
    {
      texto: '¿Qué opción está más cerca de 1 entero?',
      opciones: ['5/8', '7/8', '3/4', '4/6'],
      correcta: 1,
      explicacion: 'La fracción más cercana a 1 es la que deja menos para completar el entero. A 7/8 solo le falta 1/8.'
    }
  ];

  let preguntaActual = 0;
  let respuestas = new Array(preguntas.length).fill(null);
  let aciertos = 0;
  const TOTAL = preguntas.length;
  const MINIMO = 8;

  async function obtenerEstiloUsuario() {
    try {
      const res = await fetch('/api/usuario/estilo', { credentials: 'include' });
      const data = await res.json();
      estiloUsuario = data.estilo || 'visual_verbal';
    } catch (e) {
      estiloUsuario = 'visual_verbal';
    }
  }

  function crearPuntos() {
    const progreso = document.getElementById('progresoQuiz');
    progreso.innerHTML = preguntas.map((_, i) => `<div class="punto ${i === 0 ? 'activo' : ''}" data-i="${i}">${i + 1}</div>`).join('');
    document.getElementById('badgeNivel').textContent = `⭐⭐⭐ ${TOTAL} preguntas · ${MINIMO} correctas para completar`;
    document.getElementById('contadorPregunta').textContent = `1/${TOTAL}`;
  }

  function actualizarTimer() {
    const ahora = new Date();
    const diferencia = Math.floor((ahora - fechaInicio) / 1000);
    const minutos = Math.floor(diferencia / 60);
    const segundos = diferencia % 60;
    document.getElementById('timerDisplay').innerText = `${minutos.toString().padStart(2, '0')}:${segundos.toString().padStart(2, '0')}`;
  }

  function mostrarPregunta() {
    const container = document.getElementById('preguntasContainer');
    const p = preguntas[preguntaActual];
    const respondida = respuestas[preguntaActual] !== null;
    const esCorrecta = respondida ? respuestas[preguntaActual] === p.correcta : false;

    let opcionesHTML = '';
    p.opciones.forEach((opcion, idx) => {
      let claseBtn = 'opcion-btn';
      if (respondida) {
        if (idx === p.correcta) claseBtn += ' correcta';
        if (idx === respuestas[preguntaActual] && idx !== p.correcta) claseBtn += ' incorrecta';
      }
      opcionesHTML += `<button class="${claseBtn}" onclick="seleccionarRespuesta(${preguntaActual}, ${idx})" ${respondida ? 'disabled' : ''}>${String.fromCharCode(65 + idx)}) ${opcion}</button>`;
    });

    container.innerHTML = `
      <div class="tarjeta-pregunta">
        <div class="pregunta-numero">PREGUNTA ${preguntaActual + 1} DE ${TOTAL}</div>
        <div class="pregunta-texto">${p.texto}</div>
        ${p.visual ? p.visual : ''}
        <div class="opciones">${opcionesHTML}</div>
        <div class="feedback ${respondida ? 'visible' : ''} ${esCorrecta ? 'correcto' : 'incorrecto'}">
          ${respondida ? (esCorrecta ? '✅ ' + p.explicacion : '❌ ' + p.explicacion) : ''}
        </div>
      </div>
    `;

    actualizarPuntos();
    document.getElementById('contadorPregunta').innerText = `${preguntaActual + 1}/${TOTAL}`;
    actualizarBotones();
  }

  function seleccionarRespuesta(idxPregunta, idxOpcion) {
    if (respuestas[idxPregunta] !== null) return;
    respuestas[idxPregunta] = idxOpcion;
    if (idxOpcion === preguntas[idxPregunta].correcta) aciertos++;
    document.querySelectorAll('.punto')[idxPregunta].classList.add('respondido');
    mostrarPregunta();
  }

  function cambiarPregunta(direccion) {
    if (direccion === -1 && preguntaActual > 0) {
      preguntaActual--;
      mostrarPregunta();
    } else if (direccion === 1 && preguntaActual < TOTAL - 1 && respuestas[preguntaActual] !== null) {
      preguntaActual++;
      mostrarPregunta();
    }
  }

  function actualizarPuntos() {
    document.querySelectorAll('.punto').forEach((punto, i) => {
      punto.classList.remove('activo');
      if (i === preguntaActual) punto.classList.add('activo');
    });
  }

  function actualizarBotones() {
    const btnAnterior = document.getElementById('btnAnterior');
    const btnSiguiente = document.getElementById('btnSiguiente');
    const btnEnviar = document.getElementById('btnEnviar');
    const actualRespondida = respuestas[preguntaActual] !== null;

    btnAnterior.disabled = (preguntaActual === 0);

    if (preguntaActual === TOTAL - 1) {
      btnSiguiente.style.display = 'none';
      btnEnviar.style.display = 'inline-block';
      btnEnviar.disabled = !actualRespondida;
    } else {
      btnSiguiente.style.display = 'inline-block';
      btnEnviar.style.display = 'none';
      btnSiguiente.disabled = !actualRespondida;
    }

    document.getElementById('ayudaNav').textContent = actualRespondida
      ? ''
      : 'Responde la pregunta actual para continuar.';
  }

  async function enviarQuiz() {
    const sinResponder = respuestas.filter(r => r === null).length;
    if (sinResponder > 0) {
      alert(`Te faltan ${sinResponder} preguntas por responder.`);
      return;
    }

    if (timerInterval) clearInterval(timerInterval);

    const fechaFin = new Date();
    const tiempoSegundos = Math.round((fechaFin - fechaInicio) / 1000);

    document.getElementById('preguntasContainer').style.display = 'none';
    document.getElementById('progresoQuiz').style.display = 'none';
    document.getElementById('navBotones').style.display = 'none';
    document.getElementById('ayudaNav').style.display = 'none';

    const resultado = document.getElementById('resultado');
    resultado.classList.add('visible');

    const aprobado = aciertos >= MINIMO;
    const pct = Math.round((aciertos / TOTAL) * 100);

    document.getElementById('resultadoPuntaje').innerHTML = `${aciertos}/${TOTAL}`;
    document.getElementById('resultadoEmoji').innerHTML = aprobado ? '🏆' : '📚';
    document.getElementById('resultadoTiempo').innerHTML = `⏱️ Tiempo: ${tiempoSegundos} segundos`;

    if (aprobado) {
      document.getElementById('resultadoTitulo').innerHTML = '¡Excelente!';
      document.getElementById('resultadoMensaje').innerHTML = `Obtuviste ${pct}%. Completaste el nivel difícil.`;
      document.getElementById('btnReintentar').style.display = 'none';
      await guardarProgreso(aciertos, TOTAL, tiempoSegundos, true);
    } else {
      document.getElementById('resultadoTitulo').innerHTML = 'Sigue practicando';
      document.getElementById('resultadoMensaje').innerHTML = `Obtuviste ${pct}%. Necesitas al menos ${MINIMO} de ${TOTAL} para completar este nivel.`;
      document.getElementById('btnReintentar').style.display = 'inline-block';
      await guardarProgreso(aciertos, TOTAL, tiempoSegundos, false);
    }
  }

  async function guardarProgreso(aciertos, total, tiempoSegundos, aprobado) {
    try {
      await fetch('/api/progreso/nivel', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({
          contenido_id: 4,
          nivel_completado: 'dificil',
          puntaje: Math.round((aciertos / total) * 100),
          aprobado: aprobado,
          aciertos: aciertos,
          total_preguntas: total,
          tiempo_segundos: tiempoSegundos,
          fecha_inicio: fechaInicio.toISOString()
        })
      });
    } catch (e) {
      console.error('Error guardando progreso:', e);
    }
  }

  function reiniciarQuiz() {
    preguntaActual = 0;
    respuestas = new Array(preguntas.length).fill(null);
    aciertos = 0;
    fechaInicio = new Date();

    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(actualizarTimer, 1000);

    document.getElementById('preguntasContainer').style.display = 'block';
    document.getElementById('progresoQuiz').style.display = 'flex';
    document.getElementById('navBotones').style.display = 'flex';
    document.getElementById('ayudaNav').style.display = 'block';
    document.getElementById('resultado').classList.remove('visible');

    document.querySelectorAll('.punto').forEach((punto, i) => {
      punto.classList.remove('respondido', 'activo');
      if (i === 0) punto.classList.add('activo');
    });

    mostrarPregunta();
  }

  function volverAlContenido() {
    window.location.href = '/contenidos/matematicas/reconocer-fracciones/menu.html';
  }

  (async function init() {
    await obtenerEstiloUsuario();
    crearPuntos();
    mostrarPregunta();
    timerInterval = setInterval(actualizarTimer, 1000);
  })();
</script>
