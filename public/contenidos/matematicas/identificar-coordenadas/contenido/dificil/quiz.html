<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz · Coordenadas · Nivel Difícil</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #f97316, #c2410c);
            min-height: 100vh;
            color: white;
        }

        .quiz-container {
            max-width: 900px;
            margin: 50px auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 4px solid #fde68a;
        }

        .quiz-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .quiz-header h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 2.5rem;
            color: #fde68a;
            text-shadow: 3px 3px 0 #9a3412;
        }

        .badge-nivel {
            background: #9a3412;
            color: white;
            padding: 8px 25px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            display: inline-block;
            border: 2px solid #fde68a;
        }

        .timer-container {
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 10px 20px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 2px solid #fde68a;
        }

        .timer-label {
            font-size: 1rem;
            font-weight: 700;
        }

        .timer-value {
            font-size: 1.2rem;
            font-weight: 800;
            color: #fde68a;
            font-family: monospace;
        }

        .progreso-quiz {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .punto {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: 3px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            color: white;
            transition: all 0.3s;
        }

        .punto.activo {
            background: #fde68a;
            border-color: white;
            color: #9a3412;
            transform: scale(1.2);
        }

        .punto.respondido {
            background: #4caf50;
            border-color: white;
            color: white;
        }

        .tarjeta-pregunta {
            background: white;
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 25px;
            border: 4px solid #fde68a;
            box-shadow: 0 8px 0 #fdba74;
            color: #9a3412;
        }

        .pregunta-numero {
            font-size: 0.9rem;
            color: #f97316;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .pregunta-texto {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .contexto-ejercicio {
            background: #fff3e0;
            border-left: 8px solid #f97316;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 25px;
            font-size: 1rem;
            line-height: 1.5;
        }

        .opciones {
            display: grid;
            gap: 12px;
        }

        .opcion-btn {
            background: #fff7e6;
            border: 3px solid #f97316;
            border-radius: 20px;
            padding: 12px 18px;
            color: #9a3412;
            font-weight: 600;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .opcion-btn:hover:not(:disabled) {
            background: #fde68a;
            transform: scale(1.02);
            border-color: #c2410c;
        }

        .opcion-btn.correcta {
            background: #4caf50;
            color: white;
            border-color: white;
        }

        .opcion-btn.incorrecta {
            background: #f44336;
            color: white;
            border-color: white;
        }

        .opcion-btn:disabled {
            cursor: not-allowed;
            opacity: 0.95;
        }

        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 15px;
            font-weight: 600;
            display: none;
        }

        .feedback.visible {
            display: block;
        }

        .feedback.correcto {
            background: #c8e6c9;
            color: #2e7d32;
            border-left: 8px solid #2e7d32;
        }

        .feedback.incorrecto {
            background: #ffcdd2;
            color: #c62828;
            border-left: 8px solid #c62828;
        }

        .navegador-quiz {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn-nav {
            background: #fde68a;
            color: #9a3412;
            border: none;
            padding: 10px 25px;
            border-radius: 40px;
            font-weight: 800;
            font-size: 1rem;
            border: 3px solid white;
            transition: all 0.2s;
        }

        .btn-nav:hover:not(:disabled) {
            background: white;
            transform: scale(1.05);
        }

        .btn-nav:disabled {
            background: #b0bec5;
            opacity: 0.5;
            cursor: not-allowed;
        }

        .contador {
            background: #9a3412;
            color: white;
            padding: 6px 20px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            border: 2px solid #fde68a;
        }

        .resultado {
            text-align: center;
            padding: 30px;
            display: none;
        }

        .resultado.visible {
            display: block;
        }

        .resultado-emoji {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .resultado-titulo {
            font-family: 'Fredoka One', cursive;
            font-size: 2rem;
            color: #fde68a;
            margin-bottom: 15px;
        }

        .resultado-puntaje {
            font-size: 3rem;
            font-weight: 900;
            color: white;
            background: #9a3412;
            display: inline-block;
            padding: 15px 40px;
            border-radius: 60px;
            margin: 20px 0;
            border: 4px solid #fde68a;
        }

        .btn-accion {
            background: #fde68a;
            color: #9a3412;
            border: none;
            padding: 12px 35px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1.1rem;
            margin: 8px;
            border: 4px solid white;
            transition: all 0.2s;
        }

        .btn-accion:hover {
            transform: scale(1.05);
            background: white;
        }

        @media (max-width: 768px) {
            .quiz-container {
                margin: 20px;
                padding: 25px;
            }
            .quiz-header h1 {
                font-size: 2rem;
            }
            .pregunta-texto {
                font-size: 1.1rem;
            }
            .navegador-quiz {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<audio id="audioClick" src="/contenidos/matematicas/recursos/sonidos/click.mp3"></audio>
<audio id="audioDing" src="/contenidos/matematicas/recursos/sonidos/ding.mp3"></audio>
<audio id="audioError" src="/contenidos/matematicas/recursos/sonidos/error.mp3"></audio>
<audio id="audioTada" src="/contenidos/matematicas/recursos/sonidos/tada.mp3"></audio>

<div class="quiz-container">
    <div class="quiz-header">
        <i class="fas fa-star fa-2x" style="color: #fde68a;"></i>
        <h1>Mini-Quiz</h1>
        <p class="lead">Identificar coordenadas · Nivel Difícil</p>
        <span class="badge-nivel">⭐⭐⭐ 5 preguntas · 4 correctas para completar</span>
    </div>

    <div class="timer-container">
        <span class="timer-label"><i class="fas fa-hourglass-half me-2"></i> Tiempo:</span>
        <span class="timer-value" id="timerDisplay">00:00</span>
    </div>

    <div class="progreso-quiz" id="progresoQuiz">
        <div class="punto activo" data-i="0">1</div>
        <div class="punto" data-i="1">2</div>
        <div class="punto" data-i="2">3</div>
        <div class="punto" data-i="3">4</div>
        <div class="punto" data-i="4">5</div>
    </div>

    <div id="preguntasContainer"></div>

    <div class="navegador-quiz" id="navBotones">
        <button class="btn-nav" id="btnAnterior" onclick="cambiarPregunta(-1)" disabled>← Anterior</button>
        <span class="contador" id="contadorPregunta">1/5</span>
        <button class="btn-nav" id="btnSiguiente" onclick="cambiarPregunta(1)">Siguiente →</button>
        <button class="btn-nav" id="btnEnviar" onclick="enviarQuiz()" style="display: none;">Enviar</button>
    </div>

    <div class="resultado" id="resultado">
        <div class="resultado-emoji" id="resultadoEmoji">🏆</div>
        <div class="resultado-titulo" id="resultadoTitulo">¡Lo lograste!</div>
        <div class="resultado-puntaje" id="resultadoPuntaje">5/5</div>
        <p class="mb-4" id="resultadoMensaje"></p>
        <p class="text-white-50" id="resultadoTiempo"></p>
        <button class="btn-accion" onclick="volverAlContenido()">
            <i class="fas fa-arrow-left me-2"></i> Volver
        </button>
        <button class="btn-accion" id="btnReintentar" onclick="reiniciarQuiz()" style="display: none;">
            <i class="fas fa-redo me-2"></i> Reintentar
        </button>
    </div>
</div>

<script>
    let fechaInicio = new Date();
    let timerInterval = null;
    let estiloUsuario = null;

    const preguntas = [
        {
            texto: "Un barco parte del puerto en la coordenada (0,0). Navega 8 km al este, luego 5 km al norte, luego 3 km al oeste, luego 2 km al sur. ¿Cuáles son sus coordenadas finales?",
            contexto: "Las coordenadas (x, y) representan posición horizontal y vertical. Este aumenta x, oeste disminuye x. Norte aumenta y, sur disminuye y.",
            opciones: [
                "A) (5, 3)",
                "B) (11, 7)",
                "C) (5, 7)",
                "D) (11, 3)"
            ],
            correcta: 0,
            explicacion: "Inicio (0,0). 8 este: x=8. 5 norte: y=5. 3 oeste: x=5. 2 sur: y=3. Final (5,3)."
        },
        {
            texto: "En un sistema de coordenadas con letras para columnas (A=1, B=2...) y números para filas, un punto está en (M, 12). Si se mueve 3 columnas a la izquierda y 5 filas hacia arriba, ¿en qué coordenada termina?",
            contexto: "Las columnas aumentan de izquierda a derecha (A, B, C...). Las filas aumentan de arriba a abajo (1, 2, 3...).",
            opciones: [
                "A) (J, 7)",
                "B) (P, 17)",
                "C) (J, 17)",
                "D) (P, 7)"
            ],
            correcta: 0,
            explicacion: "Mover 3 columnas a la izquierda: M (13) → L (12) → K (11) → J (10). Mover 5 filas hacia arriba (disminuye): 12 → 11 → 10 → 9 → 8 → 7. Termina en (J, 7)."
        },
        {
            texto: "Un robot avanza 2.5 unidades por paso. Si da 4 pasos, ¿cuántas unidades avanza en total?",
            contexto: "Los robots pueden moverse en distancias que no son números enteros.",
            opciones: [
                "A) 8 unidades",
                "B) 9 unidades",
                "C) 10 unidades",
                "D) 12 unidades"
            ],
            correcta: 2,
            explicacion: "4 pasos × 2.5 unidades por paso = 10 unidades."
        },
        {
            texto: "En un teatro, los asientos impares están a la izquierda y los pares a la derecha. Si una fila tiene 30 asientos, ¿cuál es el último asiento del lado izquierdo?",
            contexto: "Los asientos se numeran del 1 al 30.",
            opciones: [
                "A) 15",
                "B) 29",
                "C) 30",
                "D) 28"
            ],
            correcta: 1,
            explicacion: "Con 30 asientos, hay 15 impares (izquierda) y 15 pares (derecha). El último impar es 29 (1, 3, 5, ..., 29)."
        },
        {
            texto: "En una ciudad con calles de sentido único, ¿qué debes considerar para planear una ruta?",
            contexto: "Algunas calles solo permiten circular en una dirección, lo que puede obligarte a dar rodeos.",
            opciones: [
                "A) Solo la distancia más corta en línea recta",
                "B) La dirección permitida en cada calle y avenida",
                "C) El color de las calles en el mapa",
                "D) La hora del día"
            ],
            correcta: 1,
            explicacion: "En calles de sentido único, es fundamental conocer la dirección permitida en cada vía, ya que puede que no puedas ir directamente por el camino más corto en el mapa."
        }
    ];

    let preguntaActual = 0;
    let respuestas = new Array(preguntas.length).fill(null);
    let aciertos = 0;
    const TOTAL = preguntas.length;
    const MINIMO = 4;

    const audioClick = document.getElementById('audioClick');
    const audioDing = document.getElementById('audioDing');
    const audioError = document.getElementById('audioError');
    const audioTada = document.getElementById('audioTada');

    async function obtenerEstiloUsuario() {
        try {
            const res = await fetch('/api/usuario/estilo', { credentials: 'include' });
            const data = await res.json();
            estiloUsuario = data.estilo || 'visual_verbal';
        } catch (e) {
            estiloUsuario = 'visual_verbal';
        }
    }

    function actualizarTimer() {
        const ahora = new Date();
        const diferencia = Math.floor((ahora - fechaInicio) / 1000);
        const minutos = Math.floor(diferencia / 60);
        const segundos = diferencia % 60;
        document.getElementById('timerDisplay').innerText = `${minutos.toString().padStart(2, '0')}:${segundos.toString().padStart(2, '0')}`;
    }

    function mostrarPregunta() {
        const container = document.getElementById('preguntasContainer');
        const p = preguntas[preguntaActual];
        const respondida = respuestas[preguntaActual] !== null;
        const esCorrecta = respondida ? respuestas[preguntaActual] === p.correcta : false;

        let opcionesHTML = '';
        p.opciones.forEach((opcion, idx) => {
            let claseBtn = 'opcion-btn';
            if (respondida) {
                if (idx === p.correcta) claseBtn += ' correcta';
                if (idx === respuestas[preguntaActual] && idx !== p.correcta) claseBtn += ' incorrecta';
            }
            opcionesHTML += `<button class="${claseBtn}" onclick="seleccionarRespuesta(${preguntaActual}, ${idx})" ${respondida ? 'disabled' : ''}>${opcion}</button>`;
        });

        container.innerHTML = `
            <div class="tarjeta-pregunta">
                <div class="pregunta-numero">PREGUNTA ${preguntaActual + 1} DE ${TOTAL}</div>
                <div class="pregunta-texto">${p.texto}</div>
                <div class="contexto-ejercicio">${p.contexto}</div>
                <div class="opciones">${opcionesHTML}</div>
                <div class="feedback ${respondida ? 'visible' : ''} ${esCorrecta ? 'correcto' : 'incorrecto'}">
                    ${respondida ? (esCorrecta ? '✅ ' + p.explicacion : '❌ ' + p.explicacion) : ''}
                </div>
            </div>
        `;

        actualizarPuntos();
        document.getElementById('contadorPregunta').innerText = `${preguntaActual + 1}/${TOTAL}`;
        actualizarBotones();
    }

    function seleccionarRespuesta(idxPregunta, idxOpcion) {
        if (respuestas[idxPregunta] !== null) return;
        audioClick.play();
        respuestas[idxPregunta] = idxOpcion;
        if (idxOpcion === preguntas[idxPregunta].correcta) {
            aciertos++;
            audioDing.play();
        } else {
            audioError.play();
        }
        document.querySelectorAll('.punto')[idxPregunta].classList.add('respondido');
        mostrarPregunta();
    }

    function cambiarPregunta(direccion) {
        if (direccion === -1 && preguntaActual > 0) {
            preguntaActual--;
            mostrarPregunta();
        } else if (direccion === 1 && preguntaActual < TOTAL - 1) {
            preguntaActual++;
            mostrarPregunta();
        }
    }

    function actualizarPuntos() {
        document.querySelectorAll('.punto').forEach((punto, i) => {
            punto.classList.remove('activo');
            if (i === preguntaActual) punto.classList.add('activo');
        });
    }

    function actualizarBotones() {
        const btnAnterior = document.getElementById('btnAnterior');
        const btnSiguiente = document.getElementById('btnSiguiente');
        const btnEnviar = document.getElementById('btnEnviar');

        btnAnterior.disabled = (preguntaActual === 0);
        if (preguntaActual === TOTAL - 1) {
            btnSiguiente.style.display = 'none';
            btnEnviar.style.display = 'inline-block';
        } else {
            btnSiguiente.style.display = 'inline-block';
            btnEnviar.style.display = 'none';
        }
    }

    async function enviarQuiz() {
        const sinResponder = respuestas.filter(r => r === null).length;
        if (sinResponder > 0) {
            alert(`Te faltan ${sinResponder} preguntas por responder`);
            return;
        }

        if (timerInterval) clearInterval(timerInterval);
        const fechaFin = new Date();
        const tiempoSegundos = Math.round((fechaFin - fechaInicio) / 1000);

        document.getElementById('preguntasContainer').style.display = 'none';
        document.getElementById('progresoQuiz').style.display = 'none';
        document.getElementById('navBotones').style.display = 'none';

        const resultado = document.getElementById('resultado');
        resultado.classList.add('visible');

        const aprobado = aciertos >= MINIMO;
        const pct = Math.round((aciertos / TOTAL) * 100);

        document.getElementById('resultadoPuntaje').innerHTML = `${aciertos}/${TOTAL}`;
        document.getElementById('resultadoEmoji').innerHTML = aprobado ? '🏆' : '📚';
        document.getElementById('resultadoTiempo').innerHTML = `⏱️ Tiempo: ${tiempoSegundos} segundos`;

        if (aprobado) {
            audioTada.play();
            document.getElementById('resultadoTitulo').innerHTML = '¡Excelente!';
            document.getElementById('resultadoMensaje').innerHTML = `Obtuviste ${pct}%. ¡Felicidades, completaste el nivel más difícil!`;
            document.getElementById('btnReintentar').style.display = 'none';
            await guardarProgreso(aciertos, TOTAL, tiempoSegundos, true);
        } else {
            audioError.play();
            document.getElementById('resultadoTitulo').innerHTML = 'Sigue practicando';
            document.getElementById('resultadoMensaje').innerHTML = `Obtuviste ${pct}%. Necesitas al menos ${MINIMO} de ${TOTAL} para completar el nivel difícil.`;
            document.getElementById('btnReintentar').style.display = 'inline-block';
            await guardarProgreso(aciertos, TOTAL, tiempoSegundos, false);
        }
    }

    async function guardarProgreso(aciertos, total, tiempoSegundos, aprobado) {
        try {
            await fetch('/api/progreso/nivel', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({
                    contenido_id: 5,
                    nivel_completado: 'dificil',
                    puntaje: Math.round((aciertos / total) * 100),
                    aprobado: aprobado,
                    aciertos: aciertos,
                    total_preguntas: total,
                    tiempo_segundos: tiempoSegundos,
                    fecha_inicio: fechaInicio.toISOString()
                })
            });
        } catch (e) {
            console.error('Error guardando progreso:', e);
        }
    }

    function reiniciarQuiz() {
        preguntaActual = 0;
        respuestas = new Array(preguntas.length).fill(null);
        aciertos = 0;
        fechaInicio = new Date();

        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(actualizarTimer, 1000);

        document.querySelectorAll('.punto').forEach((punto, i) => {
            punto.classList.remove('respondido', 'activo');
            if (i === 0) punto.classList.add('activo');
        });

        document.getElementById('preguntasContainer').style.display = 'block';
        document.getElementById('progresoQuiz').style.display = 'flex';
        document.getElementById('navBotones').style.display = 'flex';
        document.getElementById('resultado').classList.remove('visible');

        mostrarPregunta();
    }

    function volverAlContenido() {
        window.location.href = '../../menu.html';
    }

    (async function init() {
        await obtenerEstiloUsuario();
        mostrarPregunta();
        timerInterval = setInterval(actualizarTimer, 1000);
    })();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
