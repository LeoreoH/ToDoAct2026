  <title>Quiz - Componentes Naturales (Nivel Normal)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka+One&display=swap" rel="stylesheet">

    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Nunito',sans-serif;background:#e8f5e9;color:#1b5e20;min-height:100vh;}

    .cabecera{background:linear-gradient(135deg,#2e7d32,#1b5e20);padding:26px 20px;border-bottom:6px solid #ffea00;text-align:center;box-shadow:0 10px 20px rgba(0,0,0,.3);}
    .cabecera h1{font-family:'Fredoka One',cursive;font-size:2.4rem;color:#fff;text-shadow:3px 3px 0 #1b5e20;}
    .cabecera .sub{color:#c8e6c9;font-weight:700;font-size:.95rem;margin-top:4px;}
    .badge-bloque{background:#ffea00;color:#1b5e20;padding:8px 24px;border-radius:50px;font-weight:800;font-size:1rem;display:inline-block;border:4px solid #fff;margin-top:8px;}

    .contenedor{max-width:800px;margin:0 auto 48px;padding:0 16px;}

    /* PANTALLA INICIO */
    .pantalla{display:none;animation:aparecer .4s ease;}
    .pantalla.activa{display:block;}
    @keyframes aparecer{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

    .card-quiz{background:#fff;border-radius:26px;padding:28px;margin-top:24px;border:3px solid #2e7d32;box-shadow:0 8px 0 #1b5e20;}

    /* INICIO */
    .inicio-ico{font-size:5rem;text-align:center;margin:12px 0;}
    .inicio-titulo{font-family:'Fredoka One',cursive;font-size:2rem;color:#1b5e20;text-align:center;margin-bottom:8px;}
    .inicio-desc{text-align:center;font-size:.95rem;color:#2e7d32;font-weight:600;margin-bottom:20px;line-height:1.6;}
    .info-quiz{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
    .info-item{background:#e8f5e9;border:2px solid #a5d6a7;border-radius:40px;padding:8px 18px;font-weight:700;font-size:.88rem;display:flex;align-items:center;gap:6px;}
    .subtemas-lista{background:#f1f8e9;border-radius:16px;padding:14px 18px;border-left:6px solid #ffea00;margin-bottom:20px;}
    .subtemas-lista li{font-size:.9rem;font-weight:600;color:#1b5e20;margin-bottom:5px;}

    .btn-empezar{display:block;width:fit-content;margin:0 auto;background:#ffea00;color:#1b5e20;border:4px solid #2e7d32;padding:14px 48px;border-radius:60px;font-weight:800;font-size:1.25rem;cursor:pointer;box-shadow:0 7px 0 #1b5e20;transition:all .2s;text-decoration:none;}
    .btn-empezar:hover{transform:translateY(-4px);box-shadow:0 11px 0 #1b5e20;background:#fff;}

    /* BARRA PROGRESO QUIZ */
    .quiz-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
    .quiz-num{font-family:'Fredoka One',cursive;font-size:1.1rem;color:#2e7d32;white-space:nowrap;}
    .barra-wrap{flex:1;background:#e8f5e9;border-radius:20px;height:14px;border:2px solid #a5d6a7;overflow:hidden;min-width:100px;}
    .barra-fill{height:100%;background:linear-gradient(90deg,#43a047,#ffea00);border-radius:20px;transition:width .5s ease;}
    .quiz-pts{background:#ffea00;color:#1b5e20;border:3px solid #2e7d32;padding:5px 14px;border-radius:30px;font-weight:800;font-size:.88rem;white-space:nowrap;box-shadow:0 3px 0 #1b5e20;}

    /* PREGUNTA */
    .preg-tema{font-size:.75rem;font-weight:700;color:#66bb6a;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
    .preg-txt{font-family:'Fredoka One',cursive;font-size:1.35rem;color:#1b5e20;margin-bottom:16px;line-height:1.4;}
    .preg-ico{font-size:2.8rem;text-align:center;margin-bottom:10px;}

    /* OPCIONES */
    .opciones{display:flex;flex-direction:column;gap:10px;}
    .opcion{background:#f1f8e9;border:3px solid #2e7d32;border-radius:15px;padding:13px 18px;cursor:pointer;font-weight:700;font-size:.95rem;transition:all .2s;display:flex;align-items:center;gap:12px;box-shadow:0 4px 0 #1b5e20;}
    .opcion:hover:not(.bloq){background:#dcedc8;transform:translateX(4px);}
    .opcion.sel-ok{background:#c8e6c9;border-color:#43a047;box-shadow:0 4px 0 #2e7d32;}
    .opcion.sel-err{background:#ffcdd2;border-color:#e53935;box-shadow:0 4px 0 #b71c1c;}
    .opcion.revelar-ok{background:#c8e6c9;border-color:#43a047;}
    .opcion.bloq{cursor:default;}
    .op-letra{width:32px;height:32px;border-radius:50%;background:#2e7d32;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.9rem;flex-shrink:0;transition:background .2s;}
    .opcion.sel-ok .op-letra{background:#43a047;}
    .opcion.sel-err .op-letra{background:#e53935;}
    .opcion.revelar-ok .op-letra{background:#43a047;}

    /* EXPLICACIÓN */
    .explicacion{background:#e8f5e9;border-radius:14px;padding:12px 16px;border-left:6px solid #ffea00;margin-top:14px;font-size:.88rem;font-weight:600;display:none;}
    .explicacion.vis{display:block;animation:aparecer .3s ease;}

    /* BTN SIGUIENTE */
    .btn-sig-preg{background:#2e7d32;color:#fff;border:none;padding:12px 32px;border-radius:38px;font-weight:800;font-size:1rem;cursor:pointer;box-shadow:0 5px 0 #1b5e20;transition:all .2s;display:none;margin-top:14px;}
    .btn-sig-preg.vis{display:inline-flex;align-items:center;gap:8px;}
    .btn-sig-preg:hover{transform:translateY(-3px);box-shadow:0 8px 0 #1b5e20;}

    /* INDICADORES DE PREGUNTA */
    .dots-preg{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin:14px 0 4px;}
    .dot-p{width:22px;height:22px;border-radius:50%;background:#c8e6c9;border:2px solid #2e7d32;transition:all .3s;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:800;color:#1b5e20;}
    .dot-p.act{background:#ffea00;border-color:#2e7d32;transform:scale(1.2);}
    .dot-p.ok{background:#43a047;border-color:#fff;color:#fff;}
    .dot-p.err{background:#ef5350;border-color:#fff;color:#fff;}

    .resultado-ico{font-size:5rem;text-align:center;margin:12px 0;}
    .resultado-titulo{font-family:'Fredoka One',cursive;font-size:2rem;color:#1b5e20;text-align:center;margin-bottom:8px;}
    .resultado-score{font-family:'Fredoka One',cursive;font-size:3.5rem;color:#2e7d32;text-align:center;}
    .resultado-sub{text-align:center;font-size:.95rem;color:#66bb6a;font-weight:600;margin-bottom:18px;}
    .resultado-barra{background:#e8f5e9;border-radius:20px;height:20px;border:3px solid #2e7d32;overflow:hidden;margin:14px 0;}
    .resultado-fill{height:100%;background:linear-gradient(90deg,#43a047,#ffea00);border-radius:20px;transition:width 1.2s ease;}

    .resumen-lista{display:flex;flex-direction:column;gap:7px;margin-top:14px;max-height:320px;overflow-y:auto;}
    .resumen-item{display:flex;align-items:flex-start;gap:10px;background:#f1f8e9;border-radius:11px;padding:9px 13px;border:2px solid #a5d6a7;font-size:.83rem;}
    .resumen-item .ri-ico{font-size:1.1rem;flex-shrink:0;margin-top:2px;}
    .resumen-item.ok-r{border-color:#a5d6a7;background:#f1f8e9;}
    .resumen-item.err-r{border-color:#ef9a9a;background:#fff3f3;}
    .resumen-item .ri-preg{font-weight:700;color:#1b5e20;line-height:1.3;}
    .resumen-item .ri-resp{font-size:.78rem;color:#66bb6a;}

    .btn-repetir{background:#ffea00;color:#1b5e20;}
    .btn-volver{background:#fff;color:#1b5e20;text-decoration:none;display:inline-flex;align-items:center;}

    .medalla{font-size:4rem;text-align:center;margin:8px 0;display:block;}

      .cabecera h1{font-size:1.8rem;}

      .opcion{font-size:.88rem;}
    }

    </div>

    <div class="quiz-meta">
      <div class="meta-pill"><i class="fas fa-question-circle me-2"></i> 5 preguntas</div>

      <div class="meta-pill"><i class="fas fa-clock me-2"></i> <span id="timerDisplay">00:00</span></div>
    </div>

    <div class="progress-row" id="progressArea">
      <div class="progress-label" id="questionLabel">Pregunta 1/5</div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="meta-pill"><i class="fas fa-star me-2"></i> <span id="scoreBadge">0/5</span></div>
    </div>

    <div class="dots" id="progressDots"></div>

    <div class="question-card" id="questionCard">
      <div class="question-number" id="questionNumber">PREGUNTA 1 DE 5</div>
      <div class="question-text" id="questionText"></div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
    </div>

    <div class="action-row" id="navRow">
      <button class="btn-quiz btn-alt" id="btnPrev" onclick="anteriorPregunta()" style="display:none;">
        <i class="fas fa-arrow-left me-2"></i> Anterior
      </button>
      <button class="btn-quiz" id="btnNext" onclick="siguientePregunta()">
        Siguiente <i class="fas fa-arrow-right ms-2"></i>
      </button>
      <button class="btn-quiz" id="btnSubmit" onclick="enviarQuiz()" style="display:none;">
        <i class="fas fa-check me-2"></i> Enviar
      </button>
    </div>

    <div class="result" id="result">
      <div class="result-emoji" id="resultEmoji">🎯</div>
      <div class="result-title" id="resultTitle"></div>
      <div class="result-score" id="resultScore"></div>
      <div class="result-message" id="resultMessage"></div>
      <div class="result-time" id="resultTime"></div>
      <div class="action-row" style="margin-top:20px;">
        <button class="btn-quiz" onclick="volverAlContenido()">
          <i class="fas fa-arrow-left me-2"></i> Volver al menú</button>
        <button class="btn-quiz btn-alt" id="btnNextLevel" onclick="irSiguienteNivel()" style="display:none;">
          Siguiente nivel <i class="fas fa-arrow-right ms-2"></i>
        </button>
        <button class="btn-quiz btn-danger" id="btnRetry" onclick="reiniciarQuiz()" style="display:none;">
          <i class="fas fa-redo me-2"></i> Reintentar
        </button>
      </div>
    </div>
  </div>

    .inicio-desc{text-align:center;font-size:.95rem;color:#2e7d32;font-weight:600;margin-bottom:20px;line-height:1.6;}
    .info-quiz{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
    .info-item{background:#e8f5e9;border:2px solid #a5d6a7;border-radius:40px;padding:8px 18px;font-weight:700;font-size:.88rem;display:flex;align-items:center;gap:6px;}
    .subtemas-lista{background:#f1f8e9;border-radius:16px;padding:14px 18px;border-left:6px solid #ffea00;margin-bottom:20px;}
    .subtemas-lista li{font-size:.9rem;font-weight:600;color:#1b5e20;margin-bottom:5px;}

    .btn-empezar{display:block;width:fit-content;margin:0 auto;background:#ffea00;color:#1b5e20;border:4px solid #2e7d32;padding:14px 48px;border-radius:60px;font-weight:800;font-size:1.25rem;cursor:pointer;box-shadow:0 7px 0 #1b5e20;transition:all .2s;text-decoration:none;}
    .btn-empezar:hover{transform:translateY(-4px);box-shadow:0 11px 0 #1b5e20;background:#fff;}

    /* BARRA PROGRESO QUIZ */
    .quiz-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
    .quiz-num{font-family:'Fredoka One',cursive;font-size:1.1rem;color:#2e7d32;white-space:nowrap;}
    .barra-wrap{flex:1;background:#e8f5e9;border-radius:20px;height:14px;border:2px solid #a5d6a7;overflow:hidden;min-width:100px;}
    .barra-fill{height:100%;background:linear-gradient(90deg,#43a047,#ffea00);border-radius:20px;transition:width .5s ease;}
    .quiz-pts{background:#ffea00;color:#1b5e20;border:3px solid #2e7d32;padding:5px 14px;border-radius:30px;font-weight:800;font-size:.88rem;white-space:nowrap;box-shadow:0 3px 0 #1b5e20;}

    /* PREGUNTA */
    .preg-tema{font-size:.75rem;font-weight:700;color:#66bb6a;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
    .preg-txt{font-family:'Fredoka One',cursive;font-size:1.35rem;color:#1b5e20;margin-bottom:16px;line-height:1.4;}
    .preg-ico{font-size:2.8rem;text-align:center;margin-bottom:10px;}

    /* OPCIONES */
    .opciones{display:flex;flex-direction:column;gap:10px;}
    .opcion{background:#f1f8e9;border:3px solid #2e7d32;border-radius:15px;padding:13px 18px;cursor:pointer;font-weight:700;font-size:.95rem;transition:all .2s;display:flex;align-items:center;gap:12px;box-shadow:0 4px 0 #1b5e20;}
    .opcion:hover:not(.bloq){background:#dcedc8;transform:translateX(4px);}
    .opcion.sel-ok{background:#c8e6c9;border-color:#43a047;box-shadow:0 4px 0 #2e7d32;}
    .opcion.sel-err{background:#ffcdd2;border-color:#e53935;box-shadow:0 4px 0 #b71c1c;}
    .opcion.revelar-ok{background:#c8e6c9;border-color:#43a047;}
    .opcion.bloq{cursor:default;}
    .op-letra{width:32px;height:32px;border-radius:50%;background:#2e7d32;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.9rem;flex-shrink:0;transition:background .2s;}
    .opcion.sel-ok .op-letra{background:#43a047;}
    .opcion.sel-err .op-letra{background:#e53935;}
    .opcion.revelar-ok .op-letra{background:#43a047;}

    /* EXPLICACIÓN */
    .explicacion{background:#e8f5e9;border-radius:14px;padding:12px 16px;border-left:6px solid #ffea00;margin-top:14px;font-size:.88rem;font-weight:600;display:none;}
    .explicacion.vis{display:block;animation:aparecer .3s ease;}

    /* BTN SIGUIENTE */
    .btn-sig-preg{background:#2e7d32;color:#fff;border:none;padding:12px 32px;border-radius:38px;font-weight:800;font-size:1rem;cursor:pointer;box-shadow:0 5px 0 #1b5e20;transition:all .2s;display:none;margin-top:14px;}
    .btn-sig-preg.vis{display:inline-flex;align-items:center;gap:8px;}
    .btn-sig-preg:hover{transform:translateY(-3px);box-shadow:0 8px 0 #1b5e20;}

    /* INDICADORES DE PREGUNTA */
    .dots-preg{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin:14px 0 4px;}
    .dot-p{width:22px;height:22px;border-radius:50%;background:#c8e6c9;border:2px solid #2e7d32;transition:all .3s;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:800;color:#1b5e20;}
    .dot-p.act{background:#ffea00;border-color:#2e7d32;transform:scale(1.2);}
    .dot-p.ok{background:#43a047;border-color:#fff;color:#fff;}
    .dot-p.err{background:#ef5350;border-color:#fff;color:#fff;}

    /* RESULTADOS */
    .resultado-ico{font-size:5rem;text-align:center;margin:12px 0;}
    .resultado-titulo{font-family:'Fredoka One',cursive;font-size:2rem;color:#1b5e20;text-align:center;margin-bottom:8px;}
    .resultado-score{font-family:'Fredoka One',cursive;font-size:3.5rem;color:#2e7d32;text-align:center;}
    .resultado-sub{text-align:center;font-size:.95rem;color:#66bb6a;font-weight:600;margin-bottom:18px;}
    .resultado-barra{background:#e8f5e9;border-radius:20px;height:20px;border:3px solid #2e7d32;overflow:hidden;margin:14px 0;}
    .resultado-fill{height:100%;background:linear-gradient(90deg,#43a047,#ffea00);border-radius:20px;transition:width 1.2s ease;}

    .resumen-lista{display:flex;flex-direction:column;gap:7px;margin-top:14px;max-height:320px;overflow-y:auto;}
    .resumen-item{display:flex;align-items:flex-start;gap:10px;background:#f1f8e9;border-radius:11px;padding:9px 13px;border:2px solid #a5d6a7;font-size:.83rem;}
    .resumen-item .ri-ico{font-size:1.1rem;flex-shrink:0;margin-top:2px;}
    .resumen-item.ok-r{border-color:#a5d6a7;background:#f1f8e9;}
    .resumen-item.err-r{border-color:#ef9a9a;background:#fff3f3;}
    .resumen-item .ri-preg{font-weight:700;color:#1b5e20;line-height:1.3;}
    .resumen-item .ri-resp{font-size:.78rem;color:#66bb6a;}

    .btns-final{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px;}
    .btn-final{padding:12px 30px;border-radius:40px;font-weight:800;font-size:.95rem;cursor:pointer;box-shadow:0 5px 0 #1b5e20;transition:all .2s;border:3px solid #2e7d32;}
    .btn-final:hover{transform:translateY(-3px);box-shadow:0 8px 0 #1b5e20;}
    .btn-repetir{background:#ffea00;color:#1b5e20;}
    .btn-volver{background:#fff;color:#1b5e20;text-decoration:none;display:inline-flex;align-items:center;}

    /* Medalla */
    .medalla{font-size:4rem;text-align:center;margin:8px 0;display:block;}

    @media(max-width:576px){
      .cabecera h1{font-size:1.8rem;}
      .preg-txt{font-size:1.15rem;}
      .opcion{font-size:.88rem;}
    }
  </style>
</body>
</html>
