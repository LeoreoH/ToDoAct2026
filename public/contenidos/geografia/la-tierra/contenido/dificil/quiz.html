<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz · La Tierra · Nivel Difícil</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Fuentes -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka+One&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #0d47a1, #01579b);
      min-height: 100vh;
      color: white;
    }

    .quiz-container {
      max-width: 800px;
      margin: 50px auto;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 40px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      border: 4px solid #ffd600;
      position: relative;
      overflow: hidden;
    }

    .quiz-container::before {
      content: "🔥";
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 50px;
      opacity: 0.1;
      transform: rotate(-15deg);
    }

    .quiz-container::after {
      content: "🌍";
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-size: 60px;
      opacity: 0.1;
    }

    .quiz-header {
      text-align: center;
      margin-bottom: 30px;
      position: relative;
    }

    .quiz-header h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 3rem;
      color: #ffd600;
      text-shadow: 3px 3px 0 #01579b;
    }

    .badge-nivel {
      background: #01579b;
      color: white;
      padding: 8px 25px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1.1rem;
      display: inline-block;
      border: 2px solid #ffd600;
      box-shadow: 0 4px 0 #002171;
    }

    .badge-intentos {
      background: #ffd600;
      color: #01579b;
      padding: 5px 15px;
      border-radius: 30px;
      font-weight: 700;
      display: inline-block;
      border: 2px solid white;
      margin-top: 10px;
    }

    .progreso-quiz {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 30px 0;
    }

    .punto {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: 3px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.2rem;
      color: white;
      transition: all 0.3s;
    }

    .punto.activo {
      background: #ffd600;
      border-color: white;
      color: #01579b;
      transform: scale(1.2);
      box-shadow: 0 0 15px #ffd600;
    }

    .punto.respondido {
      background: #4caf50;
      border-color: white;
    }

    .punto.correcto {
      background: #4caf50;
      border-color: #ffd600;
    }

    .tarjeta-pregunta {
      background: white;
      border-radius: 30px;
      padding: 30px;
      margin-bottom: 25px;
      border: 4px solid #ffd600;
      box-shadow: 0 8px 0 #b26a00;
      color: #01579b;
      animation: slideIn 0.5s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .pregunta-numero {
      font-size: 1rem;
      color: #1976d2;
      font-weight: 800;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .pregunta-texto {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 25px;
      line-height: 1.4;
    }

    .opciones {
      display: grid;
      gap: 12px;
    }

    .opcion-btn {
      background: #e3f2fd;
      border: 3px solid #1976d2;
      border-radius: 20px;
      padding: 15px 20px;
      color: #01579b;
      font-weight: 600;
      font-size: 1.1rem;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .opcion-btn:hover:not(:disabled) {
      background: #ffd600;
      transform: scale(1.02) translateX(5px);
      border-color: #01579b;
    }

    .opcion-btn.correcta {
      background: #4caf50;
      color: white;
      border-color: white;
      animation: pulseVerde 0.5s;
    }

    .opcion-btn.incorrecta {
      background: #f44336;
      color: white;
      border-color: white;
      animation: shake 0.3s;
    }

    @keyframes pulseVerde {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); background: #66bb6a; }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-5px); }
      40%, 80% { transform: translateX(5px); }
    }

    .opcion-btn:disabled {
      cursor: not-allowed;
      opacity: 0.9;
    }

    .opcion-btn::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 5px;
      height: 5px;
      background: rgba(255,255,255,0.5);
      opacity: 0;
      border-radius: 100%;
      transform: scale(1, 1) translate(-50%);
      transform-origin: 50% 50%;
    }

    .opcion-btn:active::after {
      animation: ripple 0.3s ease-out;
    }

    @keyframes ripple {
      0% {
        transform: scale(0, 0);
        opacity: 0.5;
      }
      100% {
        transform: scale(20, 20);
        opacity: 0;
      }
    }

    .feedback {
      margin-top: 20px;
      padding: 15px;
      border-radius: 15px;
      font-weight: 600;
      display: none;
      animation: fadeIn 0.3s;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .feedback.visible {
      display: block;
    }

    .feedback.correcto {
      background: #c8e6c9;
      color: #2e7d32;
      border-left: 8px solid #2e7d32;
    }

    .feedback.incorrecto {
      background: #ffcdd2;
      color: #c62828;
      border-left: 8px solid #c62828;
    }

    .navegador-quiz {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 30px;
    }

    .btn-nav {
      background: #ffd600;
      color: #01579b;
      border: none;
      padding: 12px 30px;
      border-radius: 40px;
      font-weight: 800;
      font-size: 1.2rem;
      border: 3px solid white;
      transition: all 0.2s;
      box-shadow: 0 4px 0 #b26a00;
      position: relative;
      overflow: hidden;
    }

    .btn-nav:hover:not(:disabled) {
      background: white;
      transform: scale(1.05);
      box-shadow: 0 6px 0 #b26a00;
    }

    .btn-nav:disabled {
      background: #b0bec5;
      opacity: 0.5;
      box-shadow: none;
    }

    .btn-nav::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 5px;
      height: 5px;
      background: rgba(255,255,255,0.5);
      opacity: 0;
      border-radius: 100%;
      transform: scale(1, 1) translate(-50%);
      transform-origin: 50% 50%;
    }

    .btn-nav:active::after {
      animation: ripple 0.3s ease-out;
    }

    .contador {
      background: #01579b;
      color: white;
      padding: 8px 25px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1.1rem;
      border: 2px solid #ffd600;
      box-shadow: 0 4px 0 #002171;
    }

    .contador-estrellas {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 20px 0;
    }

    .estrella {
      font-size: 2.5rem;
      color: #ffd600;
      opacity: 0.3;
      transition: all 0.3s;
      filter: drop-shadow(0 0 5px rgba(255,214,0,0.5));
    }

    .estrella.obtenida {
      opacity: 1;
      animation: estrellaBrillo 0.5s;
    }

    @keyframes estrellaBrillo {
      0% { transform: scale(1); }
      50% { transform: scale(1.5); color: white; filter: drop-shadow(0 0 15px gold); }
      100% { transform: scale(1); }
    }

    .resultado {
      text-align: center;
      padding: 30px;
      display: none;
      animation: popIn 0.5s;
    }

    @keyframes popIn {
      0% { transform: scale(0); }
      80% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .resultado.visible {
      display: block;
    }

    .resultado-emoji {
      font-size: 6rem;
      margin-bottom: 15px;
      animation: bounce 1s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    .resultado-titulo {
      font-family: 'Fredoka One', cursive;
      font-size: 2.8rem;
      color: #ffd600;
      margin-bottom: 15px;
      text-shadow: 3px 3px 0 #01579b;
    }

    .resultado-puntaje {
      font-size: 5rem;
      font-weight: 900;
      color: white;
      background: #01579b;
      display: inline-block;
      padding: 20px 60px;
      border-radius: 60px;
      margin: 20px 0;
      border: 4px solid #ffd600;
      box-shadow: 0 8px 0 #002171;
    }

    .btn-accion {
      background: #ffd600;
      color: #01579b;
      border: none;
      padding: 15px 40px;
      border-radius: 60px;
      font-weight: 800;
      font-size: 1.3rem;
      margin: 10px;
      border: 4px solid white;
      transition: all 0.2s;
      box-shadow: 0 4px 0 #b26a00;
    }

    .btn-accion:hover {
      transform: scale(1.05) translateY(-2px);
      background: white;
      box-shadow: 0 6px 0 #b26a00;
    }
  </style>
</head>
<body>

<div class="quiz-container">
  <div class="quiz-header">
    <i class="fas fa-crown fa-3x" style="color: #ffd600;"></i>
    <h1>Mini-Quiz</h1>
    <p class="lead">La Tierra · Nivel Difícil</p>
    <span class="badge-nivel">🔥 Avanzado</span>
    <div class="badge-intentos mt-3">
      <i class="fas fa-trophy me-2"></i> 4/5 para ganar
    </div>
  </div>

  <!-- Puntos de progreso -->
  <div class="progreso-quiz" id="progresoQuiz">
    <div class="punto activo" data-i="0">1</div>
    <div class="punto" data-i="1">2</div>
    <div class="punto" data-i="2">3</div>
    <div class="punto" data-i="3">4</div>
    <div class="punto" data-i="4">5</div>
  </div>

  <!-- Contenedor de estrellas (aparece al final) -->
  <div class="contador-estrellas" id="contadorEstrellas" style="display: none;">
    <span class="estrella" id="estrella1">⭐</span>
    <span class="estrella" id="estrella2">⭐</span>
    <span class="estrella" id="estrella3">⭐</span>
    <span class="estrella" id="estrella4">⭐</span>
    <span class="estrella" id="estrella5">⭐</span>
  </div>

  <!-- Contenedor de preguntas -->
  <div id="preguntasContainer"></div>

  <!-- Navegación -->
  <div class="navegador-quiz" id="navBotones">
    <button class="btn-nav" id="btnAnterior" onclick="cambiarPregunta(-1)" disabled>← Anterior</button>
    <span class="contador" id="contadorPregunta">1/5</span>
    <button class="btn-nav" id="btnSiguiente" onclick="cambiarPregunta(1)">Siguiente →</button>
    <button class="btn-nav" id="btnEnviar" onclick="enviarQuiz()" style="display: none;">Enviar</button>
  </div>

  <!-- Resultado -->
  <div class="resultado" id="resultado">
    <div class="resultado-emoji" id="resultadoEmoji">🏆</div>
    <div class="resultado-titulo" id="resultadoTitulo">¡Lo lograste!</div>
    <div class="resultado-puntaje" id="resultadoPuntaje">5/5</div>
    <p class="mb-4" id="resultadoMensaje"></p>
    <button class="btn-accion" onclick="volverAlContenido()">
      <i class="fas fa-arrow-left me-2"></i> Volver
    </button>
    <button class="btn-accion" id="btnSiguienteNivel" onclick="irSiguienteNivel()" style="display: none;">
      ¡Completado! <i class="fas fa-check ms-2"></i>
    </button>
    <button class="btn-accion" id="btnReintentar" onclick="reiniciarQuiz()" style="display: none;">
      <i class="fas fa-redo me-2"></i> Reintentar
    </button>
  </div>

</div>

<script>
  // ===== SISTEMA DE SONIDOS =====
  const sonidos = {
    correcto: new Audio('/contenidos/geografia/recursos/sonidos/ding.mp3'),
    incorrecto: new Audio('/contenidos/geografia/recursos/sonidos/error.mp3'),
    click: new Audio('/contenidos/geografia/recursos/sonidos/click.mp3'),
    completar: new Audio('/contenidos/geografia/recursos/sonidos/tada.mp3')
  };

  // Configurar volumen y manejo de errores
  Object.values(sonidos).forEach(s => {
    if (s.src) {
      s.volume = 0.3;
      s.load();
    }
  });

  function reproducirSonido(nombre) {
    if (sonidos[nombre] && sonidos[nombre].src) {
      sonidos[nombre].currentTime = 0;
      sonidos[nombre].play().catch(() => {});
    }
  }

  // ===== PREGUNTAS DEL NIVEL DIFÍCIL =====
  const preguntas = [
    {
      texto: "¿Qué coordenada geográfica mide la distancia desde el Ecuador hacia el Norte o Sur?",
      opciones: ["Longitud", "Latitud", "Altitud", "Meridiano"],
      correcta: 1,
      explicacion: "La latitud mide la distancia desde el Ecuador (0°) hasta los polos (90° N o S)."
    },
    {
      texto: "¿Cuál es el paralelo ubicado a 23°27' en el hemisferio norte?",
      opciones: ["Ecuador", "Trópico de Capricornio", "Trópico de Cáncer", "Círculo Polar Ártico"],
      correcta: 2,
      explicacion: "El Trópico de Cáncer está a 23°27' N. El Trópico de Capricornio está a 23°27' S."
    },
    {
      texto: "¿Cada cuántos grados de longitud cambia la hora en los husos horarios?",
      opciones: ["10°", "15°", "20°", "30°"],
      correcta: 1,
      explicacion: "Cada 15° de longitud equivale a 1 hora de diferencia. La Tierra gira 360° en 24 horas (360/24 = 15° por hora)."
    },
    {
      texto: "¿Qué meridiano marca la Línea Internacional de Cambio de Fecha?",
      opciones: ["Meridiano de Greenwich (0°)", "Meridiano 90°", "Meridiano 180°", "Meridiano 360°"],
      correcta: 2,
      explicacion: "La Línea Internacional de Cambio de Fecha está aproximadamente en el meridiano 180°, opuesto a Greenwich."
    },
    {
      texto: "¿Qué proyección cartográfica conserva las formas pero distorsiona el tamaño de los polos?",
      opciones: ["Peters", "Robinson", "Mercator", "Goode"],
      correcta: 2,
      explicacion: "La proyección de Mercator conserva las formas (útil para navegación) pero hace que los polos se vean más grandes de lo que son."
    }
  ];

  let preguntaActual = 0;
  let respuestas = new Array(preguntas.length).fill(null);
  let aciertos = 0;
  const TOTAL = preguntas.length;
  const MINIMO = 4;

  function mostrarPregunta() {
    const container = document.getElementById('preguntasContainer');
    const p = preguntas[preguntaActual];
    const respondida = respuestas[preguntaActual] !== null;
    const esCorrecta = respondida ? respuestas[preguntaActual] === p.correcta : false;

    let opcionesHTML = '';
    p.opciones.forEach((opcion, idx) => {
      let claseBtn = 'opcion-btn';
      if (respondida) {
        if (idx === p.correcta) claseBtn += ' correcta';
        if (idx === respuestas[preguntaActual] && idx !== p.correcta) claseBtn += ' incorrecta';
      }
      opcionesHTML += `
        <button class="${claseBtn}" onclick="seleccionarRespuesta(${preguntaActual}, ${idx})" ${respondida ? 'disabled' : ''}>
          ${String.fromCharCode(65 + idx)}) ${opcion}
        </button>
      `;
    });

    container.innerHTML = `
      <div class="tarjeta-pregunta">
        <div class="pregunta-numero">PREGUNTA ${preguntaActual + 1} DE ${TOTAL}</div>
        <div class="pregunta-texto">${p.texto}</div>
        <div class="opciones">${opcionesHTML}</div>
        <div class="feedback ${respondida ? 'visible' : ''} ${esCorrecta ? 'correcto' : 'incorrecto'}" id="feedback-${preguntaActual}">
          ${respondida ? (esCorrecta ? '✅ ' + p.explicacion : '❌ ' + p.explicacion) : ''}
        </div>
      </div>
    `;

    actualizarPuntos();
    document.getElementById('contadorPregunta').innerText = `${preguntaActual + 1}/${TOTAL}`;
    actualizarBotones();
  }

  function seleccionarRespuesta(idxPregunta, idxOpcion) {
    if (respuestas[idxPregunta] !== null) return;

    respuestas[idxPregunta] = idxOpcion;
    if (idxOpcion === preguntas[idxPregunta].correcta) {
      aciertos++;
      reproducirSonido('correcto');
    } else {
      reproducirSonido('incorrecto');
    }

    document.querySelectorAll('.punto')[idxPregunta].classList.add('respondido');
    mostrarPregunta();
  }

  function cambiarPregunta(direccion) {
    reproducirSonido('click');
    if (direccion === -1 && preguntaActual > 0) {
      preguntaActual--;
      mostrarPregunta();
    } else if (direccion === 1 && preguntaActual < TOTAL - 1) {
      preguntaActual++;
      mostrarPregunta();
    }
  }

  function actualizarPuntos() {
    document.querySelectorAll('.punto').forEach((punto, i) => {
      punto.classList.remove('activo');
      if (i === preguntaActual) punto.classList.add('activo');
    });
  }

  function actualizarBotones() {
    const btnAnterior = document.getElementById('btnAnterior');
    const btnSiguiente = document.getElementById('btnSiguiente');
    const btnEnviar = document.getElementById('btnEnviar');

    btnAnterior.disabled = (preguntaActual === 0);
    
    if (preguntaActual === TOTAL - 1) {
      btnSiguiente.style.display = 'none';
      btnEnviar.style.display = 'inline-block';
    } else {
      btnSiguiente.style.display = 'inline-block';
      btnEnviar.style.display = 'none';
    }
  }

  function mostrarEstrellas() {
    const contenedor = document.getElementById('contadorEstrellas');
    contenedor.style.display = 'flex';
    
    for (let i = 1; i <= 5; i++) {
      const estrella = document.getElementById(`estrella${i}`);
      estrella.classList.remove('obtenida');
      if (i <= aciertos) {
        setTimeout(() => {
          estrella.classList.add('obtenida');
        }, i * 200);
      }
    }
  }

  function enviarQuiz() {
    const sinResponder = respuestas.filter(r => r === null).length;
    if (sinResponder > 0) {
      alert(`⚠️ Te faltan ${sinResponder} preguntas por responder`);
      return;
    }

    reproducirSonido('completar');

    document.getElementById('preguntasContainer').style.display = 'none';
    document.getElementById('progresoQuiz').style.display = 'none';
    document.getElementById('navBotones').style.display = 'none';
    document.getElementById('contadorEstrellas').style.display = 'flex';

    mostrarEstrellas();

    setTimeout(() => {
      const resultado = document.getElementById('resultado');
      resultado.classList.add('visible');

      const aprobado = aciertos >= MINIMO;
      const pct = Math.round((aciertos / TOTAL) * 100);

      document.getElementById('resultadoPuntaje').innerHTML = `${aciertos}/${TOTAL}`;
      document.getElementById('resultadoEmoji').innerHTML = aprobado ? '🏆' : '📚';
      document.getElementById('resultadoTitulo').innerHTML = aprobado ? '¡Lo lograste!' : 'Sigue practicando';

      if (aprobado) {
        document.getElementById('resultadoMensaje').innerHTML = 
          `¡Excelente! Obtuviste ${pct}% (${aciertos} de ${TOTAL}). Has completado el nivel difícil.`;
        document.getElementById('btnSiguienteNivel').style.display = 'inline-block';
        document.getElementById('btnReintentar').style.display = 'none';
        guardarProgreso(aciertos, TOTAL);
      } else {
        document.getElementById('resultadoMensaje').innerHTML = 
          `Obtuviste ${pct}% (${aciertos} de ${TOTAL}). Necesitas al menos 4 de 5 para aprobar. ¡Inténtalo de nuevo!`;
        document.getElementById('btnSiguienteNivel').style.display = 'none';
        document.getElementById('btnReintentar').style.display = 'inline-block';
      }
    }, 1500);
  }

  function reiniciarQuiz() {
    preguntaActual = 0;
    respuestas = new Array(preguntas.length).fill(null);
    aciertos = 0;

    document.querySelectorAll('.punto').forEach((punto, i) => {
      punto.classList.remove('respondido', 'activo');
      if (i === 0) punto.classList.add('activo');
    });

    document.getElementById('preguntasContainer').style.display = 'block';
    document.getElementById('progresoQuiz').style.display = 'flex';
    document.getElementById('navBotones').style.display = 'flex';
    document.getElementById('contadorEstrellas').style.display = 'none';
    document.getElementById('resultado').classList.remove('visible');
    
    mostrarPregunta();
  }

  async function guardarProgreso(aciertos, total) {
    try {
      await fetch('/api/progreso/nivel', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({
          contenido_id: 1,
          nivel_completado: 'dificil',
          puntaje: Math.round((aciertos / total) * 100),
          aprobado: true,
          aciertos: aciertos,
          total_preguntas: total
        })
      });
    } catch(e) {
      console.error('Error guardando progreso:', e);
    }
  }

  function volverAlContenido() {
    window.location.href = 'visual_verbal.html';
  }

  function irSiguienteNivel() {
    alert('¡Felicidades! Has completado todos los niveles de este bloque.');
    window.location.href = '../../menu.html';
  }

  mostrarPregunta();
</script>
