<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloque III: Población Mundial</title>
<link rel="stylesheet" href="menu.css">
</head>

<body>

<header class="bloque-header">
    <button class="boton-volver" onclick="volver()">← Volver</button>
    <h1 id="nombre-bloque">Bloque III: Población Mundial</h1>
</header>

<div class="contenedor-actividad">

    <h2>Elige una opción</h2>

    <div class="contenedor-niveles">

        <button id="btn-diagnostico" onclick="irADiagnostico()">
            <span>Examen diagnóstico</span>
            <span class="descripcion-nivel">
                Descubre tu nivel inicial sobre los Componentes Naturales
            </span>
        </button>

        <button onclick="mostrarContenidos()">
            <span>Contenidos</span>
            <span class="descripcion-nivel">
                Accede a los niveles del bloque
            </span>
        </button>

    </div>

    <div id="bloque-contenidos" style="display:none">

        <h3>Niveles del contenido</h3>

        <div class="contenedor-niveles">
            <button id="btn-facil" onclick="abrirNivel('facil')" disabled>
                <span>Fácil</span>
                <span class="descripcion-nivel">Conceptos básicos: relieve, agua y clima</span>
            </button>
            <button id="btn-normal" onclick="abrirNivel('normal')" disabled>
                <span>Normal</span>
                <span class="descripcion-nivel">Placas tectónicas, ríos, regiones naturales</span>
            </button>
            <button id="btn-dificil" onclick="abrirNivel('dificil')" disabled>
                <span>Difícil</span>
                <span class="descripcion-nivel">Factores del clima, mantos acuíferos, vegetación</span>
            </button>
        </div>

    </div>

</div>

<script src="/configClient.js"></script>
<script src="menu.js"></script>
</body>
</html>
